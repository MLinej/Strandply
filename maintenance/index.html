<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--r:#D5110A;--rd:#A60D07;--rs:#FDECEB;--bg:#fff;--bs:#fafafa;--b2:#f4f4f4;--k:#1a1a1a;--k3:#646464;--k4:#9a9a9a;--k5:#c8c8c8;--br:#e4e4e4;--br2:#cacaca;--g:#15803d;--gs:#ecfdf5;--bl:#1d4ed8;--bls:#eff6ff;--am:#b45309;--ams:#fffbeb;--amd:#fde68a;--sh:0 1px 3px rgba(0,0,0,.07);--shm:0 4px 16px rgba(0,0,0,.08);--shl:0 12px 36px rgba(0,0,0,.12)}
html,body{min-height:100vh;background:var(--bs);color:var(--k);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:inherit}
.tb{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-bottom:1px solid var(--br);height:54px;padding:0 20px;display:flex;align-items:center;justify-content:space-between}
.tb-logo{width:32px;height:32px;border-radius:7px;background:var(--r);color:#fff;font-family:'Urbanist',sans-serif;font-weight:900;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb-name{font-family:'Urbanist',sans-serif;font-weight:800;font-size:14px;color:var(--k)}
.tb-name em{color:var(--r);font-style:normal}
.tb-sub{font-size:9.5px;color:var(--k4);text-transform:uppercase;letter-spacing:.07em}
.uchip{display:flex;align-items:center;gap:8px;padding:4px 10px;background:var(--bs);border:1px solid var(--br);border-radius:99px}
.uchip .uav{width:26px;height:26px;border-radius:50%;background:var(--r);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.home-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border:1.5px solid var(--br);border-radius:5px;font-size:11px;font-weight:700;font-family:'Urbanist',sans-serif;color:var(--k4);background:var(--bg);cursor:pointer;transition:.13s}
.home-btn:hover{border-color:var(--r);color:var(--r);background:var(--rs)}
.tb-divider{width:1px;height:22px;background:var(--br);flex-shrink:0}
.hbtn{padding:5px 12px;border:1px solid var(--br);border-radius:5px;font-size:11px;font-weight:700;font-family:'Urbanist',sans-serif;color:var(--k4);background:var(--bg);cursor:pointer;transition:.13s}
.hbtn:hover{border-color:var(--r);color:var(--r)}
.hbtn.primary{background:var(--r);color:#fff;border-color:var(--r)}
.hbtn.primary:hover{background:var(--rd)}
.lay{display:flex;min-height:calc(100vh - 54px)}
.sb{width:210px;flex-shrink:0;border-right:1px solid var(--br);background:var(--bg);padding:14px 0;position:sticky;top:54px;height:calc(100vh - 54px);overflow-y:auto;display:flex;flex-direction:column}
.nl{font-size:9px;font-weight:800;color:var(--k5);text-transform:uppercase;letter-spacing:.13em;padding:7px 10px 3px}
.nl-row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px 3px}
.nl-row .nl{padding:0}
.nl-add{font-size:9px;color:var(--r);background:none;border:none;cursor:pointer;font-weight:700;font-family:'Urbanist',sans-serif}
.nb{display:flex;align-items:center;gap:7px;width:calc(100% - 16px);padding:7px 10px;border-radius:5px;font-size:12.5px;font-weight:600;color:var(--k4);cursor:pointer;border:none;background:none;text-align:left;transition:.12s;margin:1px 8px}
.nb:hover{background:var(--b2);color:var(--k)}
.nb.on{background:var(--rs);color:var(--r);font-weight:700}
.ni{font-size:13px;width:17px;text-align:center;flex-shrink:0}
.nbd{margin-left:auto;background:var(--r);color:#fff;border-radius:99px;font-size:9px;font-weight:800;padding:1px 5px}
.ndv{border:none;border-top:1px solid var(--br);margin:6px 10px}
.sb-footer{margin-top:auto;padding:10px 12px;border-top:1px solid var(--br);font-size:10px;color:var(--k4);line-height:1.7}
.mn{flex:1;min-width:0;padding:0 20px 80px}
.ph{padding:22px 0 14px;display:flex;align-items:flex-end;justify-content:space-between;gap:10px;flex-wrap:wrap}
.ph h1{font-family:'Urbanist',sans-serif;font-size:22px;font-weight:900;letter-spacing:-.02em}
.ph h1 em{color:var(--r);font-style:normal}
.ph p{color:var(--k4);font-size:12px;margin-top:3px}
.vt-toggle{display:flex;border:1px solid var(--br);border-radius:5px;overflow:hidden;background:var(--bg)}
.vt-toggle button{padding:5px 13px;font-size:11px;font-weight:700;font-family:'Urbanist',sans-serif;border:none;cursor:pointer;background:transparent;color:var(--k4);transition:.13s}
.vt-toggle button.on{background:var(--r);color:#fff}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:5px;font-size:12px;font-family:'Urbanist',sans-serif;font-weight:700;letter-spacing:.01em;border:1.5px solid transparent;background:transparent;color:var(--k);transition:.13s;cursor:pointer}
.bp{background:var(--r);color:#fff;border-color:var(--r)}.bp:hover{background:var(--rd)}
.bo{border-color:var(--br2);color:var(--k);background:var(--bg)}.bo:hover{border-color:var(--k4)}
.bg-btn{color:var(--k4)}.bg-btn:hover{background:var(--b2)}
.bdn{background:#fef2f2;color:var(--r);border-color:#fecaca}.bdn:hover{background:var(--r);color:#fff}
.bsm{padding:4px 9px;font-size:11px}.bxs{padding:3px 7px;font-size:10.5px}
.bwa{background:#f0fdf4;color:#15803d;border:1.5px solid #bbf7d0}.bwa:hover{background:#dcfce7}
.sr{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-bottom:14px}
.sc{background:var(--bg);border:1px solid var(--br);border-radius:8px;padding:12px 14px;box-shadow:var(--sh)}
.sc .sl{font-size:9.5px;font-weight:700;color:var(--k4);text-transform:uppercase;letter-spacing:.09em;margin-bottom:4px}
.sc .sv{font-family:'Urbanist',sans-serif;font-size:22px;font-weight:900;line-height:1}
.sc.sca .sv{color:var(--bl)}.sc.scl .sv{color:var(--g)}.sc.scb .sv{color:var(--r)}

.fb input:focus,.fb select:focus{border-color:var(--r)}
.sw{position:relative;flex:1;min-width:180px}.sw input{width:100%;padding-left:28px}
.sw .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--k4);font-size:12px;pointer-events:none}
.tw{border:1px solid var(--br);border-radius:8px;overflow:hidden;box-shadow:var(--sh);background:var(--bg)}
.vtbl{width:100%;border-collapse:collapse;font-size:12.5px}
.vtbl thead th{background:var(--bs);border-bottom:1px solid var(--br);padding:8px 11px;text-align:left;font-size:9.5px;font-weight:700;color:var(--k4);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.vtbl tbody tr{border-bottom:1px solid var(--br);transition:.1s;cursor:pointer}
.vtbl tbody tr:last-child{border-bottom:none}
.vtbl tbody tr:hover{background:var(--bs)}
.vtbl tbody tr.sel{background:var(--rs)}
.vtbl td{padding:9px 11px;vertical-align:middle}
.ac{display:flex;gap:3px}
.bd{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.bd .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.cp{display:inline-block;padding:1px 6px;border-radius:99px;font-size:9.5px;font-weight:700;white-space:nowrap}
.cp.c1{background:#fef9c3;color:#713f12}.cp.c2{background:#e0e7ff;color:#3730a3}.cp.c3{background:#fce7f3;color:#9d174d}
.cp.c4{background:#dbeafe;color:#1e3a8a}.cp.c5{background:#d1fae5;color:#065f46}.cp.c6{background:#ede9fe;color:#5b21b6}.cp.c7{background:var(--b2);color:var(--k4)}

.board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.bcol-hd{display:flex;align-items:center;gap:6px;margin-bottom:10px;padding-bottom:8px}
.wcard{background:var(--bg);border:1px solid var(--br);border-radius:8px;padding:12px 13px;cursor:pointer;box-shadow:var(--sh);transition:.18s}

.wcard.sel{border:1.5px solid var(--r)}
.wcard-acts{display:flex;gap:4px;border-top:1px solid var(--br);padding-top:8px;margin-top:8px}
.empty{text-align:center;padding:40px 16px;color:var(--k4)}
.empty .ei{font-size:28px;margin-bottom:6px}
.empty h3{font-family:'Urbanist',sans-serif;font-size:14px;font-weight:700;color:var(--k);margin-bottom:3px}
.dp{width:380px;flex-shrink:0;background:var(--bg);border:1px solid var(--br);border-radius:10px;box-shadow:var(--shm);overflow:hidden;position:sticky;top:70px}
.dp-hd{padding:14px 16px;border-bottom:1px solid var(--br);background:var(--bs);display:flex;justify-content:space-between;align-items:flex-start}
.dp-acts{padding:10px 16px;border-bottom:1px solid var(--br);display:flex;gap:6px}
.dp-tabs{display:flex;border-bottom:1px solid var(--br)}
.dp-tab{flex:1;padding:9px 0;font-size:11.5px;font-weight:700;font-family:'Urbanist',sans-serif;border:none;cursor:pointer;background:transparent;color:var(--k4);border-bottom:2px solid transparent;transition:.13s}
.dp-tab.on{color:var(--r);border-bottom-color:var(--r)}
.dp-body{padding:14px 16px;max-height:calc(100vh - 300px);overflow-y:auto}
.tc-lbl{font-size:9.5px;font-weight:700;color:var(--k4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.tc-val{font-size:12.5px;font-weight:600}
.info-box{font-size:12.5px;color:var(--k3);line-height:1.55;background:var(--bs);padding:10px 11px;border-radius:6px;border:1px solid var(--br);margin-top:4px}
.note-box{background:var(--ams);border:1px solid var(--amd)}
.status-update{background:var(--bs);border:1px solid var(--br);border-radius:7px;padding:12px 13px;margin-bottom:12px}
.pl{font-size:9.5px;font-weight:700;color:var(--k4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.tl-add{margin-bottom:16px;background:var(--bs);border:1px solid var(--br);border-radius:7px;padding:11px 12px}
.tl-add textarea{width:100%;border:1.5px solid var(--br);border-radius:5px;padding:7px 9px;font-size:12.5px;color:var(--k);background:var(--bg);resize:vertical;font-family:inherit;margin-top:6px;outline:none;transition:.13s}
.tl-add textarea:focus{border-color:var(--r)}
.tl-wrap{position:relative}
.tl-line{position:absolute;left:14px;top:0;bottom:0;width:1px;background:var(--br)}
.tl-entry{display:flex;gap:12px;margin-bottom:16px;position:relative}
.tl-icon{width:28px;height:28px;border-radius:50%;flex-shrink:0;z-index:1;display:flex;align-items:center;justify-content:center;font-size:12px;box-shadow:0 0 0 2px var(--br);border:2px solid var(--bg)}
.tl-text{font-size:12.5px;color:var(--k);font-weight:600;line-height:1.4;margin-bottom:3px}
.tl-meta{font-size:10.5px;color:var(--k4)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:300;display:flex;align-items:flex-start;justify-content:center;padding:20px 14px;overflow-y:auto}
.md{background:var(--bg);border:1px solid var(--br);border-radius:12px;box-shadow:var(--shl);width:100%;max-width:680px;margin:auto}
.md.sm{max-width:440px}
.mh{padding:18px 22px 14px;border-bottom:1px solid var(--br);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.mh h2{font-family:'Urbanist',sans-serif;font-size:17px;font-weight:800;letter-spacing:-.01em}
.mh .ms{font-size:11px;color:var(--k4);margin-top:2px}
.mc{background:none;border:none;font-size:18px;cursor:pointer;color:var(--k4);padding:2px;line-height:1}
.mc:hover{color:var(--r)}
.mb{padding:18px 22px}
.mf{padding:12px 22px;border-top:1px solid var(--br);display:flex;align-items:center;justify-content:flex-end;gap:8px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
.ff{grid-column:1/-1}
.fd{display:flex;flex-direction:column;gap:4px}
.fd label{font-size:9.5px;font-weight:700;color:var(--k4);text-transform:uppercase;letter-spacing:.05em}
.fd .rq{color:var(--r)}
.fd input,.fd select,.fd textarea{padding:7px 10px;border:1.5px solid var(--br);border-radius:5px;font-size:13px;color:var(--k);background:var(--bg);outline:none;min-height:36px;transition:.13s}
.fd input:focus,.fd select:focus,.fd textarea:focus{border-color:var(--r);box-shadow:0 0 0 3px rgba(213,17,10,.06)}
.fd textarea{resize:vertical;min-height:60px}
.sdv{grid-column:1/-1;border:none;border-top:1px solid var(--br);margin:3px 0}
.slb{grid-column:1/-1;font-family:'Urbanist',sans-serif;font-size:10.5px;font-weight:800;color:var(--k);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.area-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bs);border:1px solid var(--br);border-radius:6px}
.in-use{font-size:9px;background:var(--bls);color:var(--bl);padding:1px 6px;border-radius:99px;font-weight:700}
.area-del{background:none;border:none;cursor:pointer;color:var(--r);font-size:15px;line-height:1;padding:2px 4px}
.area-del:disabled{color:var(--k5);cursor:not-allowed}
.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--bg);border:1px solid var(--br);border-radius:7px;padding:10px 16px;font-size:12.5px;font-weight:600;box-shadow:var(--shm);animation:tsin .22s ease}
.toast.ok{border-color:#bbf7d0;background:var(--gs);color:var(--g)}
.toast.er{border-color:#fecaca;background:#fef2f2;color:var(--r)}
@keyframes tsin{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
</style>

function shareWhatsApp(task){
  var overdue=task.dueDate<today()&&task.status!=="Completed";
  var lines=[
    "\uD83D\uDD27 *Maintenance Work Order \u2014 "+task.id+"*","",
    "\uD83D\uDCCC *"+task.title+"*","",
    "\uD83C\uDFF7 Priority: *"+task.priority+"*"+(task.priority==="Critical"?" \uD83D\uDD34":""),
    "\uD83D\uDCCA Status: *"+task.status+"*",
    "\u2699\uFE0F Category: "+task.category,
    "\uD83D\uDCCD Area: "+task.area,
    "\uD83D\uDC64 Assigned To: "+task.assignee,
    "\uD83D\uDCC5 Due Date: "+fmtDate(task.dueDate)+(overdue?" \u26A0\uFE0F *OVERDUE*":""),
  ];
  if(task.description)lines.push("","📝 *Description:*\n"+task.description);
  if(task.notes)lines.push("","💬 *Notes:*\n"+task.notes);
  lines.push("","_Strandply LLP — Maintenance Tracker_");
  window.open("https://wa.me/?text="+encodeURIComponent(lines.join("\n")),"_blank");
}

    h("span",{style:{marginLeft:"auto",fontSize:11,color:"var(--k4)"}},filtered.length+" record"+(filtered.length!==1?"s":""))

        h("th",null,"Priority"),h("th",null,"Status"),h("th",null,"Assignee"),h("th",null,"Due"),h("th",null)

      h("tbody",null,
        filtered.length===0?h("tr",null,h("td",{colSpan:9},
          h("div",{className:"empty"},h("div",{className:"ei"},"\uD83D\uDD27"),h("h3",null,"No work orders found"),h("p",null,"Try adjusting your filters."))

        filtered.map(function(task){
          var overdue=task.dueDate<todayStr&&task.status!=="Completed";

            h("td",null,h(PBadge,{p:task.priority})),
            h("td",null,h(SBadge,{s:task.status})),
            h("td",{style:{fontSize:12}},task.assignee),
            h("td",{style:{fontSize:11,color:overdue?"var(--r)":"var(--k4)",fontWeight:overdue?700:400}},overdue?"\u26A0 ":null,fmtDate(task.dueDate)),
            h("td",null,
              h("div",{className:"ac"},
                h("button",{className:"btn bg-btn bxs",title:"Edit",onClick:function(e){e.stopPropagation();openEdit(task);}},"\u270E"),
                h("button",{className:"btn bxs",title:"Download PDF",style:{color:"#D5110A",background:"var(--rs)",border:"none",opacity:pdfLoading===task.id?0.5:1},onClick:function(e){e.stopPropagation();handlePDF(task);}},pdfLoading===task.id?"\u2026":"\u2B07"),

        })
      )
    )
  );

  /* Board view */
  var boardView=h("div",{className:"board"},
    STATUSES.map(function(status){
      var col=filtered.filter(function(t){return t.status===status;});
      var sc=S_COLOR[status];
      return h("div",{key:status},
        h("div",{className:"bcol-hd",style:{borderBottom:"2px solid "+sc.color+"44"}},
          h("span",{style:{width:8,height:8,borderRadius:"50%",background:sc.color,display:"inline-block",flexShrink:0}}),
          h("span",{style:{fontSize:10,fontWeight:800,fontFamily:"Urbanist,sans-serif",textTransform:"uppercase",letterSpacing:".06em",color:sc.color}},status),

        h("div",{style:{display:"flex",flexDirection:"column",gap:8}},
          col.map(function(task){

                h(PBadge,{p:task.priority})

              h("div",{style:{fontSize:12.5,fontWeight:600,marginBottom:8,lineHeight:1.35}},task.title),
              h("div",{style:{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}},
                h(CatPill,{cat:task.category}),
                h("span",{style:{fontSize:9.5,color:"var(--k4)",background:"var(--bs)",padding:"1px 6px",borderRadius:99}},task.area)

                h("span",{style:{color:overdue?"var(--r)":"var(--k4)"}},"\uD83D\uDCC5 "+fmtDate(task.dueDate))
              ),
              h("div",{className:"wcard-acts"},
                h("button",{className:"btn bg-btn bxs",style:{flex:1,justifyContent:"center",fontSize:10},onClick:function(e){e.stopPropagation();handlePDF(task);}},pdfLoading===task.id?"\u2026":"\u2B07 PDF"),
                h("button",{className:"btn bwa bxs",style:{flex:1,justifyContent:"center",fontSize:10},onClick:function(e){e.stopPropagation();shareWhatsApp(task);}},WA_ICON," Share")
              )
            );
          }),
          col.length===0?h("div",{style:{fontSize:11,color:"var(--k5)",padding:"18px 10px",textAlign:"center",border:"1px dashed var(--br)",borderRadius:7}},"No tasks"):null
        )
      );
    })
  );

  /* Detail panel */
  var detailPanel=selectedTask?h("div",{className:"dp"},
    h("div",{className:"dp-hd"},
      h("div",{style:{flex:1,minWidth:0}},
        h("div",{style:{fontSize:10,color:"var(--bl)",fontWeight:700,marginBottom:4}},selectedTask.id),
        h("div",{style:{fontSize:14,fontWeight:800,fontFamily:"Urbanist,sans-serif",letterSpacing:"-.01em",lineHeight:1.3}},selectedTask.title)

      h("button",{className:"mc",onClick:function(){setSelected(null);}},"\u2715")
    ),
    h("div",{className:"dp-acts"},
      h("button",{className:"btn bp bsm",style:{flex:1,justifyContent:"center",opacity:pdfLoading===selectedTask.id?0.6:1},onClick:function(){handlePDF(selectedTask);}},pdfLoading===selectedTask.id?"Generating\u2026":"\u2B07 Download PDF"),
      h("button",{className:"btn bwa bsm",style:{flex:1,justifyContent:"center"},onClick:function(){shareWhatsApp(selectedTask);}},WA_ICON," WhatsApp"),
      h("button",{className:"btn bo bsm",onClick:function(){openEdit(selectedTask);}},"\u270E Edit")
    ),
    h("div",{className:"dp-tabs"},
      ["details","timeline"].map(function(k){
        var label=k==="details"?"Details":"Timeline";
        return h("button",{key:k,className:"dp-tab"+(activeTab===k?" on":""),onClick:function(){setActiveTab(k);}},
          label,
          k==="timeline"?h("span",{style:{marginLeft:4,background:"var(--bs)",color:"var(--k4)",borderRadius:99,padding:"0 5px",fontSize:10,fontWeight:800}},(selectedTask.timeline||[]).length):null
        );
      })
    ),
    h("div",{className:"dp-body"},
      activeTab==="details"?h("div",null,
        h("div",{style:{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}},
          h(PBadge,{p:selectedTask.priority}),h(SBadge,{s:selectedTask.status}),h(CatPill,{cat:selectedTask.category})
        ),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}},
          [["Assigned To",selectedTask.assignee],["Plant Area",selectedTask.area],["Created",fmtDate(selectedTask.createdAt)],["Due Date",fmtDate(selectedTask.dueDate)]].map(function(pair){
            return h("div",{key:pair[0]},h("div",{className:"tc-lbl"},pair[0]),h("div",{className:"tc-val"},pair[1]||"—"));
          })
        ),
        selectedTask.description?h("div",{style:{marginBottom:14}},h("div",{className:"pl"},"Description"),h("div",{className:"info-box"},selectedTask.description)):null,
        selectedTask.notes?h("div",{style:{marginBottom:14}},h("div",{className:"pl"},"Notes"),h("div",{className:"info-box note-box"},selectedTask.notes)):null,
        h("div",{className:"status-update"},
          h("div",{className:"pl"},"Update Status"),
          h("div",{style:{display:"flex",gap:5,flexWrap:"wrap",marginTop:6}},
            STATUSES.map(function(s){
              var sc=S_COLOR[s];
              var on=selectedTask.status===s;
              return h("button",{key:s,style:{padding:"4px 10px",borderRadius:5,fontSize:10.5,fontWeight:700,fontFamily:"Urbanist,sans-serif",border:"1.5px solid",cursor:"pointer",transition:".13s",background:on?sc.bg:"transparent",borderColor:on?sc.color:"var(--br)",color:on?sc.color:"var(--k4)"},onClick:function(){updateStatus(selectedTask.id,s);}},s);
            })
          )
        ),
        h("button",{className:"btn bdn bsm",style:{width:"100%",justifyContent:"center"},onClick:function(){if(window.confirm("Delete this work order?"))deleteTask(selectedTask.id);}},"\uD83D\uDDD1 Delete Work Order")
      ):null,
      activeTab==="timeline"?h("div",null,
        h("div",{className:"tl-add"},
          h("div",{className:"pl"},"Add a Note"),
          h("textarea",{value:noteInput,onChange:function(e){setNoteInput(e.target.value);},placeholder:"Write an update, observation or action taken\u2026",rows:2}),
          h("div",{style:{display:"flex",justifyContent:"flex-end",marginTop:7}},
            h("button",{className:"btn bp bsm",onClick:function(){addNote(selectedTask.id);}},"Post Note")

        ),
        h("div",{className:"tl-wrap"},
          h("div",{className:"tl-line"}),
          (selectedTask.timeline||[]).slice().reverse().map(function(entry){
            var bg=entry.type==="note"?"var(--ams)":entry.type==="status"?"var(--bls)":entry.type==="created"?"var(--rs)":"var(--b2)";
            return h("div",{key:entry.id,className:"tl-entry"},
              h("div",{className:"tl-icon",style:{background:bg}},TL_ICON[entry.type]||"\u2022"),
              h("div",{style:{flex:1,paddingTop:4}},
                h("div",{className:"tl-text"},entry.text),
                h("div",{className:"tl-meta"},h("span",{style:{fontWeight:700}},"\uD83D\uDC64 "+entry.by)," \u00B7 "+fmtDT(entry.at))
              )

          }),
          (!selectedTask.timeline||selectedTask.timeline.length===0)?h("div",{className:"empty"},h("div",{className:"ei"},"\uD83D\uDCCB"),h("h3",null,"No timeline yet")):null

  ):null;

  /* Area manager modal */
  var areaMgrModal=showAreaMgr?h("div",{className:"ov",onClick:function(e){if(e.target===e.currentTarget)setShowAreaMgr(false);}},
    h("div",{className:"md sm"},
      h("div",{className:"mh"},
        h("div",null,h("h2",null,"Manage Plant Areas"),h("div",{className:"ms"},"Add or remove plant areas used in work orders.")),
        h("button",{className:"mc",onClick:function(){setShowAreaMgr(false);}},"\u2715")
      ),
      h("div",{className:"mb"},
        h("div",{style:{display:"flex",gap:8,marginBottom:16}},
          h("input",{value:newArea,onChange:function(e){setNewArea(e.target.value);},onKeyDown:function(e){if(e.key==="Enter")addArea();},placeholder:"e.g. CNC Machine Shop",style:{flex:1,padding:"7px 10px",border:"1.5px solid var(--br)",borderRadius:5,fontSize:13,color:"var(--k)",outline:"none"}}),
          h("button",{className:"btn bp",onClick:addArea},"+ Add")
        ),
        h("div",{style:{display:"flex",flexDirection:"column",gap:6,maxHeight:320,overflowY:"auto"}},
          areas.map(function(a){
            var inUse=tasks.some(function(t){return t.area===a;});
            return h("div",{key:a,className:"area-row"},
              h("div",{style:{display:"flex",alignItems:"center",gap:8}},
                h("span",null,"\uD83C\uDFED"),
                h("span",{style:{fontSize:13,fontWeight:600}},a),
                inUse?h("span",{className:"in-use"},"IN USE"):null
              ),
              h("button",{className:"area-del",disabled:inUse,title:inUse?"Cannot remove — in use":"Remove",onClick:function(){removeArea(a);}},"\u2715")
            );
          })
        )
      ),
      h("div",{className:"mf"},h("button",{className:"btn bp",onClick:function(){setShowAreaMgr(false);}},"Done"))
    )
  ):null;

  /* Work order form modal */
  var formModal=showForm?h("div",{className:"ov",onClick:function(e){if(e.target===e.currentTarget)setShowForm(false);}},
    h("div",{className:"md"},
      h("div",{className:"mh"},
        h("div",null,
          h("h2",null,editId?"Edit Work Order":"New Work Order"),
          h("div",{className:"ms"},editId?"Update the details below.":"Fill in the details to create a new maintenance task.")
        ),
        h("button",{className:"mc",onClick:function(){setShowForm(false);}},"\u2715")
      ),
      h("div",{className:"mb"},
        h("div",{className:"fg"},
          h("div",{className:"slb ff"},"Task Identity"),
          h("div",{className:"fd ff"},
            h("label",null,"Title ",h("span",{className:"rq"},"*")),
            h("input",{value:form.title,onChange:function(e){setF("title",e.target.value);},placeholder:"e.g. Hydraulic Press Oil Leak \u2014 Unit 3"})
          ),
          h("div",{className:"fd"},
            h("label",null,"Category"),
            h("select",{value:form.category,onChange:function(e){setF("category",e.target.value);}},CATEGORIES.map(function(c){return h("option",{key:c},c);}))
          ),
          h("div",{className:"fd"},
            h("label",null,"Plant Area"),
            h("select",{value:form.area,onChange:function(e){setF("area",e.target.value);}},areas.map(function(a){return h("option",{key:a},a);}))
          ),
          h("hr",{className:"sdv ff"}),
          h("div",{className:"slb ff"},"Assignment & Schedule"),
          h("div",{className:"fd"},
            h("label",null,"Assigned To ",h("span",{className:"rq"},"*")),
            h("input",{value:form.assignee,onChange:function(e){setF("assignee",e.target.value);},placeholder:"Technician name"})
          ),
          h("div",{className:"fd"},
            h("label",null,"Due Date ",h("span",{className:"rq"},"*")),
            h("input",{type:"date",value:form.dueDate,onChange:function(e){setF("dueDate",e.target.value);}})
          ),
          h("div",{className:"fd"},
            h("label",null,"Priority"),
            h("select",{value:form.priority,onChange:function(e){setF("priority",e.target.value);}},PRIORITIES.map(function(p){return h("option",{key:p},p);}))
          ),
          h("div",{className:"fd"},
            h("label",null,"Status"),
            h("select",{value:form.status,onChange:function(e){setF("status",e.target.value);}},STATUSES.map(function(s){return h("option",{key:s},s);}))
          ),
          h("hr",{className:"sdv ff"}),
          h("div",{className:"slb ff"},"Details"),
          h("div",{className:"fd ff"},
            h("label",null,"Description"),
            h("textarea",{value:form.description,onChange:function(e){setF("description",e.target.value);},placeholder:"Describe the issue in detail\u2026",rows:3})
          ),
          h("div",{className:"fd ff"},
            h("label",null,"Notes / Remarks"),
            h("textarea",{value:form.notes,onChange:function(e){setF("notes",e.target.value);},placeholder:"Parts needed, observations, etc.",rows:2})
          )
        )
      ),
      h("div",{className:"mf"},
        h("button",{className:"btn bo",onClick:function(){setShowForm(false);}},"Cancel"),
        h("button",{className:"btn bp",onClick:submitForm},editId?"Save Changes":"Create Work Order")
      )
    )
  ):null;

  /* Toast */
  var toastEl=toast?h("div",{className:"toast "+(toast.type||"ok")},(toast.type==="er"?"\u26A0 ":"\u2713 ")+toast.msg):null;

  /* Assemble */
  return h("div",null,
    topbar,
    h("div",{className:"lay"},
      sidebar,
      h("div",{className:"mn"},
        h("div",{className:"ph"},
          h("div",null,
            h("h1",null,"Maintenance ",h("em",null,"Work Orders")),
            h("p",null,"Track, assign and resolve plant maintenance tasks.")
          ),
          h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
            h("div",{className:"vt-toggle"},
              h("button",{className:view==="list"?"on":"",onClick:function(){setView("list");setSelected(null);}},"\u2630 List"),
              h("button",{className:view==="board"?"on":"",onClick:function(){setView("board");setSelected(null);}},"\u229E Board")
            ),
            h("button",{className:"btn bp",onClick:openCreate},"+ New Work Order")
          )
        ),
        statsBar,
        filterBar,
        h("div",{className:"split"},
          h("div",{style:{flex:1,minWidth:0}},view==="list"?listView:boardView),
          detailPanel
        )
      )
    ),
    areaMgrModal,
    formModal,
    toastEl
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
})();
</script>
