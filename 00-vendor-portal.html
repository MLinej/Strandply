<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#D5110A"/>
<title>Strandply — Vendor Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Urbanist:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--r:#D5110A;--rd:#A60D07;--rs:#FDECEB;--bg:#fff;--bs:#fafafa;--b2:#f4f4f4;--k:#1a1a1a;--k3:#646464;--k4:#9a9a9a;--k5:#c8c8c8;--br:#e4e4e4;--br2:#cacaca;--g:#15803d;--gs:#ecfdf5;--bl:#1d4ed8;--bls:#eff6ff;--am:#b45309;--ams:#fffbeb;--amd:#fde68a;--sh:0 1px 3px rgba(0,0,0,.07);--shm:0 4px 16px rgba(0,0,0,.08);--shl:0 12px 36px rgba(0,0,0,.12)}
html,body{min-height:100vh;background:var(--bs);color:var(--k);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.uf{font-family:'Urbanist',sans-serif}
button,input,select,textarea{font-family:inherit}
.hidden{display:none!important}

/* TOPBAR */
.tb{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-bottom:1px solid var(--br);height:54px;padding:0 20px;display:flex;align-items:center;justify-content:space-between}
.tb-logo{width:32px;height:32px;border-radius:7px;background:var(--r);color:#fff;font-family:'Urbanist',sans-serif;font-weight:900;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb-name{font-family:'Urbanist',sans-serif;font-weight:800;font-size:14px;color:var(--k)}
.tb-name em{color:var(--r);font-style:normal}
.tb-sub{font-size:9.5px;color:var(--k4);text-transform:uppercase;letter-spacing:.07em}
.uchip{display:flex;align-items:center;gap:8px;padding:4px 10px;background:var(--bs);border:1px solid var(--br);border-radius:99px}
.uchip .un{font-size:12px;font-weight:700}
.uchip .ur{font-size:9.5px;color:var(--k4);text-transform:uppercase;letter-spacing:.07em}
.hbtn{padding:5px 12px;border:1px solid var(--br);border-radius:5px;font-size:11px;font-weight:700;font-family:'Urbanist',sans-serif;color:var(--k4);background:var(--bg);cursor:pointer}
.hbtn:hover{border-color:var(--r);color:var(--r)}

/* LAYOUT */
.lay{display:flex;min-height:calc(100vh - 54px)}

/* SIDEBAR */
.sb{width:210px;flex-shrink:0;border-right:1px solid var(--br);background:var(--bg);padding:14px 0;position:sticky;top:54px;height:calc(100vh - 54px);overflow-y:auto;display:flex;flex-direction:column}
.nl{font-size:9px;font-weight:800;color:var(--k5);text-transform:uppercase;letter-spacing:.13em;padding:7px 10px 3px}
.nb{display:flex;align-items:center;gap:7px;width:100%;padding:7px 10px;border-radius:5px;font-size:12.5px;font-weight:600;color:var(--k4);cursor:pointer;border:none;background:none;text-align:left;transition:.12s;margin:1px 8px;width:calc(100% - 16px)}
.nb:hover{background:var(--b2);color:var(--k)}
.nb.on{background:var(--rs);color:var(--r);font-weight:700}
.nb .ni{font-size:13px;width:17px;text-align:center;flex-shrink:0}
.nbd{margin-left:auto;background:var(--r);color:#fff;border-radius:99px;font-size:9px;font-weight:800;padding:1px 5px}
.nbd.am{background:var(--am)}
.ndv{border:none;border-top:1px solid var(--br);margin:6px 10px}
.sbf{margin-top:auto;padding:10px 12px;border-top:1px solid var(--br);font-size:10px;color:var(--k4);line-height:1.7}

/* MAIN */
.mn{flex:1;min-width:0;padding:0 20px 80px}

/* PAGE HEADER */
.ph{padding:22px 0 14px;display:flex;align-items:flex-end;justify-content:space-between;gap:10px;flex-wrap:wrap}
.ph h1{font-family:'Urbanist',sans-serif;font-size:22px;font-weight:900;letter-spacing:-.02em}
.ph h1 em{color:var(--r);font-style:normal}
.ph p{color:var(--k4);font-size:12px;margin-top:3px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:5px;font-size:12px;font-family:'Urbanist',sans-serif;font-weight:700;letter-spacing:.01em;border:1.5px solid transparent;background:transparent;color:var(--k);transition:.13s;cursor:pointer}
.bp{background:var(--r);color:#fff;border-color:var(--r)}.bp:hover{background:var(--rd)}.bp:disabled{opacity:.5;cursor:not-allowed}
.bo{border-color:var(--br2);color:var(--k);background:var(--bg)}.bo:hover{border-color:var(--k4)}
.bg{color:var(--k4)}.bg:hover{background:var(--b2)}
.bgn{background:var(--g);color:#fff;border-color:var(--g)}.bgn:hover{background:#166534}
.bam{background:var(--am);color:#fff;border-color:var(--am)}
.bdn{background:#fef2f2;color:var(--r);border-color:#fecaca}.bdn:hover{background:var(--r);color:#fff}
.bsm{padding:4px 9px;font-size:11px}
.bxs{padding:3px 7px;font-size:10.5px}

/* STATS */
.sr{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:9px;margin-bottom:16px}
.sc{background:var(--bg);border:1px solid var(--br);border-radius:8px;padding:12px 14px;box-shadow:var(--sh)}
.sc .sl{font-size:9.5px;font-weight:700;color:var(--k4);text-transform:uppercase;letter-spacing:.09em;margin-bottom:4px}
.sc .sv{font-family:'Urbanist',sans-serif;font-size:22px;font-weight:900;line-height:1}
.sc .ss{font-size:10.5px;color:var(--k4);margin-top:2px}
.scp .sv{color:var(--am)}.sca .sv{color:var(--bl)}.scl .sv{color:var(--g)}.scb .sv{color:var(--r)}

/* FILTER BAR */
.fb{display:flex;align-items:center;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.fb input,.fb select{padding:6px 10px;border:1.5px solid var(--br);border-radius:5px;font-size:12.5px;color:var(--k);background:var(--bg);outline:none;min-height:34px;transition:.13s}
.fb input:focus,.fb select:focus{border-color:var(--r)}
.sw{position:relative;flex:1;min-width:180px}
.sw input{width:100%;padding-left:28px}
.sw .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--k4);font-size:12px;pointer-events:none}

/* TABLE */
.tw{border:1px solid var(--br);border-radius:8px;overflow:hidden;box-shadow:var(--sh);background:var(--bg)}
.vt{width:100%;border-collapse:collapse;font-size:12.5px}
.vt thead th{background:var(--bs);border-bottom:1px solid var(--br);padding:8px 11px;text-align:left;font-size:9.5px;font-weight:700;color:var(--k4);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.vt tbody tr{border-bottom:1px solid var(--br);transition:.1s;cursor:pointer}
.vt tbody tr:last-child{border-bottom:none}
.vt tbody tr:hover{background:var(--bs)}
.vt td{padding:9px 11px;vertical-align:middle}
.er{text-align:center;padding:40px 16px;color:var(--k4)}
.er .ei{font-size:28px;margin-bottom:6px}
.er h3{font-family:'Urbanist',sans-serif;font-size:14px;font-weight:700;color:var(--k);margin-bottom:3px}
.ac{display:flex;gap:4px;flex-wrap:nowrap}

/* BADGES */
.bd{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.bd::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.bp2{background:var(--ams);color:var(--am)}.bp2::before{background:var(--am)}
.ba{background:var(--bls);color:var(--bl)}.ba::before{background:var(--bl)}
.bl2{background:var(--gs);color:var(--g)}.bl2::before{background:var(--g)}
.bi{background:var(--b2);color:var(--k4)}.bi::before{background:var(--k5)}
.bb{background:#fef2f2;color:var(--r)}.bb::before{background:var(--r)}

/* CAT PILLS */
.cp{display:inline-block;padding:1px 6px;border-radius:99px;font-size:9.5px;font-weight:700;white-space:nowrap}
.c1{background:#fef9c3;color:#713f12}.c2{background:#e0e7ff;color:#3730a3}
.c3{background:#fce7f3;color:#9d174d}.c4{background:#dbeafe;color:#1e3a8a}
.c5{background:#d1fae5;color:#065f46}.c6{background:#ede9fe;color:#5b21b6}
.c7{background:var(--b2);color:var(--k4)}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:300;display:flex;align-items:flex-start;justify-content:center;padding:20px 14px;overflow-y:auto}
.md{background:var(--bg);border:1px solid var(--br);border-radius:12px;box-shadow:var(--shl);width:100%;max-width:720px;margin:auto}
.md.mdw{max-width:900px}.md.mds{max-width:440px}
.mh{padding:18px 22px 14px;border-bottom:1px solid var(--br);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.mh h2{font-family:'Urbanist',sans-serif;font-size:17px;font-weight:800;letter-spacing:-.01em}
.mh .ms{font-size:11px;color:var(--k4);margin-top:2px}
.mc{background:none;border:none;font-size:18px;cursor:pointer;color:var(--k4);padding:2px;line-height:1}.mc:hover{color:var(--r)}
.mb{padding:18px 22px}
.mf{padding:12px 22px;border-top:1px solid var(--br);display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:wrap}

/* FORM */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
.fg3{grid-template-columns:1fr 1fr 1fr}
.ff{grid-column:1/-1}
.fd{display:flex;flex-direction:column;gap:4px}
.fd label{font-size:9.5px;font-weight:700;color:var(--k4);text-transform:uppercase;letter-spacing:.05em}
.fd label .rq{color:var(--r)}
.fd input,.fd select,.fd textarea{padding:7px 10px;border:1.5px solid var(--br);border-radius:5px;font-size:13px;color:var(--k);background:var(--bg);outline:none;min-height:36px;transition:.13s}
.fd input:focus,.fd select:focus,.fd textarea:focus{border-color:var(--r);box-shadow:0 0 0 3px rgba(213,17,10,.06)}
.fd textarea{resize:vertical;min-height:60px}
.fd .fh{font-size:10px;color:var(--k4)}
.sdv{grid-column:1/-1;border:none;border-top:1px solid var(--br);margin:3px 0}
.slb{grid-column:1/-1;font-family:'Urbanist',sans-serif;font-size:10.5px;font-weight:800;color:var(--k);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}

/* CAT CHECKBOXES */
.cc{grid-column:1/-1;display:flex;gap:5px;flex-wrap:wrap}
.ck{display:flex;align-items:center;gap:5px;padding:5px 10px;border:1.5px solid var(--br);border-radius:5px;cursor:pointer;font-size:11.5px;font-weight:600;color:var(--k4);transition:.12s}
.ck input{width:13px;height:13px;accent-color:var(--r);cursor:pointer;flex-shrink:0}
.ck.on{border-color:var(--r);background:var(--rs);color:var(--r)}

/* MULTISELECT */
.msw{border:1.5px solid var(--br);border-radius:5px;background:var(--bg);min-height:38px;padding:3px 7px;display:flex;flex-wrap:wrap;gap:3px;align-items:center;cursor:text;transition:.13s}
.msw:focus-within{border-color:var(--r)}
.mst{display:inline-flex;align-items:center;gap:3px;background:var(--rs);color:var(--r);border:1px solid #f8c5c2;border-radius:3px;padding:1px 6px;font-size:11px;font-weight:700}
.mst button{background:none;border:none;cursor:pointer;color:var(--r);font-size:12px;line-height:1;padding:0;opacity:.7}
.msi{border:none;outline:none;font-size:12.5px;color:var(--k);min-width:80px;flex:1;background:transparent;padding:2px 3px}
.msd{position:absolute;top:100%;left:0;right:0;background:var(--bg);border:1.5px solid var(--r);border-top:none;border-radius:0 0 5px 5px;box-shadow:var(--shm);z-index:400;max-height:180px;overflow-y:auto;display:none}
.msd.op{display:block}
.mso{display:flex;align-items:center;gap:7px;padding:7px 10px;font-size:12.5px;cursor:pointer;border-bottom:1px solid var(--br);transition:.1s}
.mso:last-child{border-bottom:none}
.mso:hover,.mso.sel{background:var(--bs)}
.mso input{width:13px;height:13px;accent-color:var(--r);cursor:pointer}

/* AUTOCOMPLETE */
.acd{position:absolute;top:100%;left:0;right:0;background:var(--bg);border:1.5px solid var(--br);border-top:none;border-radius:0 0 5px 5px;box-shadow:var(--shm);z-index:400;max-height:180px;overflow-y:auto;display:none}
.acd.op{display:block}
.aci{padding:7px 10px;font-size:12.5px;cursor:pointer;border-bottom:1px solid var(--br);transition:.1s}
.aci:last-child{border-bottom:none}
.aci:hover{background:var(--rs);color:var(--r)}
.aci em{font-style:normal;font-weight:700;color:var(--r)}

/* STARS */
.star{font-size:18px;color:var(--k5);cursor:pointer}.star.on{color:#f59e0b}

/* COMPARE BAR */
.cbr{position:fixed;bottom:0;left:210px;right:0;z-index:150;background:var(--k);color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;transform:translateY(100%);transition:.25s;box-shadow:0 -4px 20px rgba(0,0,0,.2)}
.cbr.sh{transform:translateY(0)}
.cbch{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.13);border-radius:4px;padding:4px 8px;font-size:11.5px;font-weight:600}
.cbch button{background:none;border:none;color:#fff;cursor:pointer;font-size:12px;opacity:.7;line-height:1}.cbch button:hover{opacity:1}

/* MASTER CARDS */
.mg{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:9px}
.mc2{background:var(--bg);border:1px solid var(--br);border-radius:8px;padding:13px 14px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--sh)}
.mc2n{font-size:12.5px;font-weight:700;color:var(--k)}
.mc2s{font-size:10.5px;color:var(--k4);margin-top:2px}

/* DETAIL TABS */
.dts{display:flex;border-bottom:2px solid var(--br);margin-bottom:14px}
.dt{padding:7px 14px;font-family:'Urbanist',sans-serif;font-size:12px;font-weight:700;color:var(--k4);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.12s}
.dt.on{color:var(--r);border-bottom-color:var(--r)}

/* DETAIL ROWS */
.ds{margin-bottom:14px}
.ds h3{font-size:9px;font-weight:700;color:var(--k4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--br)}
.dr{display:flex;gap:7px;margin-bottom:5px}
.dk{font-size:11px;color:var(--k4);font-weight:600;min-width:130px;flex-shrink:0}
.dv{font-size:12px;color:var(--k);font-weight:500;flex:1}

/* TIMELINE */
.tli{display:flex;gap:9px;padding-bottom:11px;position:relative}
.tli::before{content:'';position:absolute;left:7px;top:16px;bottom:0;width:1px;background:var(--br)}
.tli:last-child{padding-bottom:0}.tli:last-child::before{display:none}
.tld{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;flex-shrink:0;margin-top:2px;z-index:1;border:2px solid var(--bg)}
.tdg{background:var(--g)}.tdb{background:var(--bl)}.tdp{background:var(--k5)}.tdr{background:var(--r)}

/* REPORTS */
.rg{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:16px}
.rc{background:var(--bg);border:1px solid var(--br);border-radius:8px;padding:15px;box-shadow:var(--sh)}
.rc h3{font-family:'Urbanist',sans-serif;font-size:13px;font-weight:800;margin-bottom:10px}
.rs{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--br)}
.rs:last-child{border-bottom:none}
.rs .rk{font-size:11.5px;color:var(--k4);font-weight:600}
.rs .rv{font-family:'Urbanist',sans-serif;font-size:14px;font-weight:800}

/* PROC CARD */
.prc{background:var(--bg);border:1px solid var(--br);border-radius:8px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;box-shadow:var(--sh);margin-bottom:7px}

/* TOAST */
.tc{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.ts{background:var(--k);color:#fff;padding:9px 14px;border-radius:6px;font-size:12.5px;font-weight:600;box-shadow:var(--shl);opacity:0;transform:translateY(6px);transition:.22s;max-width:300px}
.ts.sh{opacity:1;transform:translateY(0)}
.ts.ok{background:var(--g)}.ts.er2{background:var(--r)}.ts.wn{background:var(--am)}

@media(max-width:800px){.sb{display:none}.cbr{left:0}.mn{padding:0 10px 80px}.fg,.fg3{grid-template-columns:1fr}.ff,.sdv,.slb,.cc{grid-column:1}}
@media(max-width:540px){.sr{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="tb">
  <div style="display:flex;align-items:center;gap:9px">
    <div class="tb-logo">SPL</div>
    <div><div class="tb-name">Vendor <em>Portal</em></div><div class="tb-sub">Strandply LLP · Wankaner</div></div>
  </div>
  <div style="display:flex;align-items:center;gap:7px">
    <div class="uchip"><div><div class="un" id="uN">—</div><div class="ur" id="uR">—</div></div></div>
    <button class="hbtn" onclick="location.href='/'">← Home</button>
  </div>
</div>

<div class="lay">
  <nav class="sb" id="sidebar"></nav>
  <div class="mn" id="main"></div>
</div>

<div class="cbr" id="cbr">
  <div style="display:flex;align-items:center;gap:7px;flex:1;flex-wrap:wrap" id="cbchips"></div>
  <div style="display:flex;gap:7px">
    <button style="padding:6px 12px;border-radius:4px;font-size:12px;font-weight:700;font-family:'Urbanist',sans-serif;background:rgba(255,255,255,.15);color:#fff;border:none;cursor:pointer" onclick="clearCmp()">Clear</button>
    <button style="padding:6px 12px;border-radius:4px;font-size:12px;font-weight:700;font-family:'Urbanist',sans-serif;background:var(--r);color:#fff;border:none;cursor:pointer" onclick="runCmp()">Compare →</button>
  </div>
</div>

<div id="overlays"></div>
<div class="tc" id="tc"></div>

<script>
var API='/api', V=[], P=[], C=[], CIT=[];
var CU={name:'—',role:'—',dir:false}, EVid=null, EPid=null, ECid=null, ECITid=null;
var rating=0, cmpSet=new Set(), blId=null, detId=null, detTab='ov';
var selProds=[];

// ── BOOT ────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',function(){
  document.addEventListener('click',function(e){
    if(!e.target.closest('.acd')&&!e.target.closest('#fCity')&&!e.target.closest('#fState')&&!e.target.closest('#mfState'))
      document.querySelectorAll('.acd').forEach(function(d){d.classList.remove('op');});
    if(!e.target.closest('.msd')&&!e.target.closest('.msw'))
      document.querySelectorAll('.msd').forEach(function(d){d.classList.remove('op');});
  });
  buildSidebar();
  C=loadL('spl_cat')||dCat(); P=loadL('spl_prod')||dProd(); CIT=loadL('spl_city')||dCit();
  V=loadL('spl_v')||dV();
  fetch(API+'/auth/me',{credentials:'include'}).then(function(r){return r.ok?r.json():null;}).then(function(d){
    if(!d||!d.user)return;
    CU.name=d.user.profile?(d.user.profile.firstName+' '+(d.user.profile.lastName||'')).trim():(d.user.email||'User');
    CU.dir=d.user.role==='director'; CU.role=d.user.role||'office';
    document.getElementById('uN').textContent=CU.name;
    document.getElementById('uR').textContent=CU.dir?'Director':'Operations';
  }).catch(function(){});
  document.getElementById('uN').textContent=CU.name;
  document.getElementById('uR').textContent=CU.role;
  fetch(API+'/vendors',{credentials:'include'}).then(function(r){return r.ok?r.json():null;}).then(function(d){
    if(d&&(d.vendors||Array.isArray(d))){V=d.vendors||d;saveL('spl_v',V);}
    showSec('all');
  }).catch(function(){showSec('all');});
});

function loadL(k){try{var d=localStorage.getItem(k);return d?JSON.parse(d):null;}catch(e){return null;}}
function saveL(k,d){try{localStorage.setItem(k,JSON.stringify(d));}catch(e){}}

// ── SIDEBAR ─────────────────────────────────────────────────────
function buildSidebar(){
  var sb=document.getElementById('sidebar');
  sb.innerHTML=
    nl('Vendors')+
    nb('all','🏭','All Vendors','<span class="nbd" id="nbac">0</span>')+
    nb('pending','⏳','Pending Review','<span class="nbd am" id="nbpc" style="display:none">0</span>')+
    nb('approved','✅','Approved','')+
    nb('active','🟢','Active','')+
    nb('blacklisted','🚫','Blacklisted','')+
    '<hr class="ndv">'+
    nl('By Category')+
    C.map(function(c){return nb('cat_'+slugify(c.name),c.icon||'🏷️',c.name,'');}).join('')+

var SECS=['all','pending','approved','active','blacklisted','compare','procurement','reports','products','categories','cities','tnc','system'];
function showSec(k){
  SECS.forEach(function(s){
    var el=document.getElementById('sec_'+s);
    if(el)el.classList.toggle('hidden',s!==k);
  });
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('on');});
  var nb=document.getElementById('nb_'+k);
  if(nb)nb.classList.add('on');
  // lazy render
  if(k==='all')renderTable();
  else if(k==='pending')renderPending();
  else if(k==='approved')renderApproved();
  else if(k==='active')renderActive();
  else if(k==='blacklisted')renderBL();
  else if(k==='procurement')renderProc();
  else if(k==='reports'){renderReports();}
  else if(k==='products'){renderProds();}
  else if(k==='categories'){renderCats();}
  else if(k==='cities'){renderCities();}
  if(!document.getElementById('sec_'+k))buildSec(k);
}

// ── HELPERS ─────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function slugify(s){return String(s||'').toLowerCase().replace(/[^a-z0-9]/g,'-');}
function fd(d){if(!d)return'—';try{return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return d;}}
function fmt(n){return Number(n||0).toLocaleString('en-IN');}
function cM(id){var el=document.getElementById(id);if(el)el.classList.add('hidden');}
function toast(msg,type){
  var c=document.getElementById('tc'),t=document.createElement('div');
  t.className='ts'+(type?' '+type:'');t.textContent=msg;c.appendChild(t);
  requestAnimationFrame(function(){requestAnimationFrame(function(){t.classList.add('sh');});});
  setTimeout(function(){t.classList.remove('sh');setTimeout(function(){t.remove();},250);},3000);
}
function set(id,v){var el=document.getElementById(id);if(el)el.textContent=v;}

function cpill(name){
  var cat=C.find(function(c){return c.name===name;});
  var cls=cat?cat.colorClass||'c7':'c7';
  return '<span class="cp '+cls+'">'+esc(name)+'</span>';
}
function stars(r){
  if(!r)return '<span style="color:var(--k5);font-size:11px">—</span>';
  return '<span style="color:#f59e0b;font-size:11px">'+'★'.repeat(Math.round(r))+'</span><span style="font-size:10px;color:var(--k4);margin-left:2px">'+Number(r).toFixed(1)+'</span>';
}
function sbadge(s){
  var m={pending:'bd bp2',approved:'bd ba',active:'bd bl2',inactive:'bd bi',blacklisted:'bd bb'};
  var l={pending:'Pending',approved:'Approved',active:'Active',inactive:'Inactive',blacklisted:'Blacklisted'};
  return '<span class="'+(m[s]||'bd bi')+'">'+(l[s]||s)+'</span>';
}

function updateStats(){
  var c={pending:0,approved:0,active:0,blacklisted:0};
  V.forEach(function(v){if(c[v.status]!==undefined)c[v.status]++;});
  set('st_p',c.pending);set('st_a',c.approved);set('st_l',c.active);set('st_b',c.blacklisted);set('st_t',V.length);
  set('nbac',V.length);
  var pc=document.getElementById('nbpc');
  if(pc){pc.textContent=c.pending;pc.style.display=c.pending?'':'none';}
}

// ── MAIN TABLE ───────────────────────────────────────────────────
function renderTable(){
  updateStats();
  var q=(document.getElementById('vq')||{value:''}).value.toLowerCase();
  var cf=(document.getElementById('vcat')||{value:''}).value;
  var sf=(document.getElementById('vst')||{value:''}).value;
  var so=(document.getElementById('vso')||{value:'name'}).value;
  var rows=V.filter(function(v){
    if(sf&&v.status!==sf)return false;
    if(cf&&!(v.categories||[]).includes(cf))return false;
    if(q){var h=[v.name,v.city,v.state,v.gst,v.contact,v.phone].concat(v.categories||[]).join(' ').toLowerCase();if(!h.includes(q))return false;}
    return true;
  });
  if(so==='recent')rows.sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);});
  else if(so==='rating')rows.sort(function(a,b){return(b.rating||0)-(a.rating||0);});
  else rows.sort(function(a,b){return a.name.localeCompare(b.name);});
  var tb=document.getElementById('vtb');
  if(!tb)return;
  if(!rows.length){tb.innerHTML='<tr><td colspan="8">'+er('🏭','No vendors found','Add a vendor or adjust filters.')+'</td></tr>';return;}
  tb.innerHTML=rows.map(function(v){
    var cats=(v.categories||[]).slice(0,2).map(cpill).join('');
    var chk=cmpSet.has(v._id)?'checked':'';
    return '<tr onclick="openDet(\''+v._id+'\')">'+
      '<td onclick="event.stopPropagation()"><input type="checkbox" data-id="'+v._id+'" '+chk+' onchange="togCmp(\''+v._id+'\',this.checked)" style="width:13px;height:13px;accent-color:var(--r);cursor:pointer"></td>'+
      '<td><div style="font-weight:700">'+esc(v.name)+'</div><div style="font-size:10px;color:var(--k4)">'+esc(v.code||'')+'</div></td>'+
      '<td><div style="display:flex;gap:3px;flex-wrap:wrap">'+cats+(v.categories&&v.categories.length>2?'<span style="font-size:9.5px;color:var(--k4)">+'+( v.categories.length-2)+'</span>':'')+'</div></td>'+
      '<td><div style="font-size:12px;font-weight:600">'+esc(v.city||'—')+'</div><div style="font-size:10px;color:var(--k4)">'+esc(v.state||'')+'</div></td>'+
      '<td><div style="font-size:12px;font-weight:600">'+esc(v.contact||'—')+'</div><div style="font-size:10px;color:var(--k4)">'+esc(v.phone||'')+'</div></td>'+
      '<td>'+stars(v.rating)+'</td>'+
      '<td>'+sbadge(v.status)+'</td>'+

function togCmp(id,checked){
  if(checked){if(cmpSet.size>=4){toast('Max 4 vendors','wn');return;}cmpSet.add(id);}
  else cmpSet.delete(id);
  updCmpBar();renderTable();
}
function togAllChk(checked){
  document.querySelectorAll('#vtb input[type=checkbox]').forEach(function(cb){
    if(checked&&cmpSet.size<4)cmpSet.add(cb.dataset.id);else if(!checked)cmpSet.delete(cb.dataset.id);
  });

}
function updCmpBar(){
  var bar=document.getElementById('cbr'),chips=document.getElementById('cbchips');

  bar.classList.add('sh');

    return v?'<div class="cbch">'+esc(v.name.split(' ')[0])+'<button onclick="togCmp(\''+id+'\',false)">✕</button></div>':'';
  }).join('');

function clearCmp(){cmpSet.clear();updCmpBar();renderTable();}
function runCmp(){
  if(cmpSet.size<2){toast('Select at least 2 vendors','wn');return;}
  var sel=Array.from(cmpSet).map(function(id){return V.find(function(x){return x._id===id;});}).filter(Boolean);
  var cols='160px '+sel.map(function(){return '1fr';}).join(' ');
  var rows=[
    ['',sel.map(function(v){return '<b style="font-family:Urbanist,sans-serif;color:var(--r)">'+esc(v.name)+'</b>';})],
    ['City/State',sel.map(function(v){return esc((v.city||'—')+', '+(v.state||''));})],
    ['Categories',sel.map(function(v){return(v.categories||[]).map(cpill).join(' ');})],
    ['Status',sel.map(function(v){return sbadge(v.status);})],
    ['Rating',sel.map(function(v){return stars(v.rating);})],
    ['Payment',sel.map(function(v){return esc(v.payment_terms||'—');})],
    ['GSTIN',sel.map(function(v){return esc(v.gst||'—');})],
    ['Products',sel.map(function(v){return(v.products||[]).map(function(p){return typeof p==='object'?p.name:p;}).slice(0,3).join(', ')||'—';})]
  ];

  rows.forEach(function(row){

  });

// ── FIND BY PRODUCT ──────────────────────────────────────────────
function renderProc(){
  var q=(document.getElementById('procq')||{value:''}).value.toLowerCase();
  var cf=(document.getElementById('proccat')||{value:''}).value;
  var so=(document.getElementById('procso')||{value:'rating'}).value;
  var res=[];
  V.filter(function(v){return v.status==='active'||v.status==='approved';}).forEach(function(v){
    (v.products||[]).forEach(function(p){
      var pn=typeof p==='object'?p.name:p;
      var pm=P.find(function(x){return x.name===pn;});
      if(cf&&(pm?pm.category:'')!==cf)return;
      if(q&&!pn.toLowerCase().includes(q)&&!v.name.toLowerCase().includes(q))return;
      res.push({v:v,pn:pn,pm:pm});
    });
  });
  if(so==='lead')res.sort(function(a,b){return((a.pm&&a.pm.lead)||999)-((b.pm&&b.pm.lead)||999);});
  else res.sort(function(a,b){return(b.v.rating||0)-(a.v.rating||0);});
  var el=document.getElementById('procres');if(!el)return;
  if(!res.length){el.innerHTML='<div style="background:var(--bg);border:1px solid var(--br);border-radius:8px;padding:40px;text-align:center;color:var(--k4)"><div style="font-size:26px;margin-bottom:7px">🔍</div><h3 class="uf" style="font-size:14px;color:var(--k);margin-bottom:3px">No vendors found</h3><p style="font-size:12px">Try a different product.</p></div>';return;}
  el.innerHTML=res.map(function(r){
    return '<div class="prc"><div><div style="font-family:Urbanist,sans-serif;font-weight:800;font-size:13.5px">'+esc(r.pn)+'</div>'+
      '<div style="font-size:11.5px;color:var(--k4);margin-top:2px">'+esc(r.v.name)+' · '+esc(r.v.city||'—')+', '+esc(r.v.state||'')+'</div></div>'+
      '<div style="display:flex;align-items:center;gap:10px">'+stars(r.v.rating)+sbadge(r.v.status)+
      '<button class="btn bp bsm" onclick="openDet(\''+r.v._id+'\')">View</button></div></div>';
  }).join('');
}

// ── REPORTS ──────────────────────────────────────────────────────
function renderReports(){
  var c={pending:0,approved:0,active:0,blacklisted:0};
  var rats=[],byCat={},bySt={},byTm={};
  V.forEach(function(v){
    if(c[v.status]!==undefined)c[v.status]++;
    if(v.rating)rats.push(+v.rating);
    (v.categories||[]).forEach(function(cat){byCat[cat]=(byCat[cat]||0)+1;});
    if(v.state)bySt[v.state]=(bySt[v.state]||0)+1;
    if(v.payment_terms)byTm[v.payment_terms]=(byTm[v.payment_terms]||0)+1;
  });
  set('rt',V.length);set('ral',c.active);set('rpe',c.pending);set('rbl',c.blacklisted);
  set('rrt',rats.length?(rats.reduce(function(a,b){return a+b;},0)/rats.length).toFixed(1)+'★':'—');
  function bl(o){return Object.entries(o).sort(function(a,b){return b[1]-a[1];}).slice(0,6).map(function(e){return '<div class="rs"><span class="rk">'+esc(e[0])+'</span><span class="rv">'+e[1]+'</span></div>';}).join('')||'<p style="font-size:11px;color:var(--k4)">No data</p>';}
  var rc=document.getElementById('rcat'),rs=document.getElementById('rst'),rp=document.getElementById('rpt');
  if(rc)rc.innerHTML=bl(byCat);if(rs)rs.innerHTML=bl(bySt);if(rp)rp.innerHTML=bl(byTm);
  var tb=document.getElementById('rtb');if(!tb)return;
  tb.innerHTML=V.slice().sort(function(a,b){return a.name.localeCompare(b.name);}).map(function(v){
    return '<tr><td style="font-size:10.5px;color:var(--k4)">'+esc(v.code||'—')+'</td><td style="font-weight:700">'+esc(v.name)+'</td>'+
      '<td>'+(v.categories||[]).slice(0,1).map(cpill).join('')+'</td>'+
      '<td>'+esc(v.city||'—')+'</td><td>'+sbadge(v.status)+'</td><td>'+stars(v.rating)+'</td>'+
      '<td style="font-size:10.5px">'+(v.products||[]).map(function(p){return typeof p==='object'?p.name:p;}).slice(0,3).join(', ')+'</td></tr>';
  }).join('');
}
function exportCSV(){
  var hdr=['Code','Name','Categories','City','State','GST','Status','Rating','Products'];
  var rows=V.map(function(v){return[v.code,v.name,(v.categories||[]).join('|'),v.city,v.state,v.gst,v.status,v.rating||'',(v.products||[]).map(function(p){return typeof p==='object'?p.name:p;}).join('|')];});
  var csv=[hdr].concat(rows).map(function(r){return r.map(function(c){return'"'+(String(c||'').replace(/"/g,'""'))+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='vendors.csv';a.click();
}

function filterProds(){

  drop.innerHTML=opts.map(function(p){
    var sel=selProds.indexOf(p._id)>-1;
    return '<div class="mso'+(sel?' sel':'')+'" onclick="togProd(\''+p._id+'\')">'+
      '<input type="checkbox" '+(sel?'checked':'')+' onclick="event.stopPropagation()" onchange="togProd(\''+p._id+'\')">'+

function togProd(id){

  var drop=document.getElementById('msdrop');
  if(drop)drop.querySelectorAll('.mso').forEach(function(el){var id2=el.getAttribute('onclick').match(/'([^']+)'/)?.[1];el.classList.toggle('sel',selProds.indexOf(id2)>-1);el.querySelector('input').checked=selProds.indexOf(id2)>-1;});

function onPin(val){
  var h=document.getElementById('pinH');
  if(val.length===6){
    var m=null;
    CIT.forEach(function(c){(c.pincodes||[]).forEach(function(p){if(String(p).trim()===val)m=c;});});
    if(m){
      var ci=document.getElementById('fCity'),st=document.getElementById('fState');
      if(ci)ci.value=m.city;if(st)st.value=m.state;
      if(h){h.textContent='✓ '+m.city+', '+m.state;h.style.color='var(--g)';}
    } else {if(h){h.textContent='Not found — enter manually';h.style.color='var(--am)';}}
  } else if(h)h.textContent='';
}
function onCity(val){
  var drop=document.getElementById('cityD');if(!drop)return;
  if(!val){drop.classList.remove('op');return;}
  var ms=CIT.filter(function(c){return c.city.toLowerCase().startsWith(val.toLowerCase());});
  if(!ms.length){drop.classList.remove('op');return;}
  drop.innerHTML=ms.slice(0,10).map(function(c){
    return '<div class="aci" onclick="selCity(\''+esc(c.city)+'\',\''+esc(c.state)+'\')">'+
      '<em>'+esc(c.city.slice(0,val.length))+'</em>'+esc(c.city.slice(val.length))+' <span style="font-size:10.5px;color:var(--k4)">'+esc(c.state)+'</span></div>';
  }).join('');
  drop.classList.add('op');
}
function selCity(city,state){
  var ci=document.getElementById('fCity'),st=document.getElementById('fState');
  if(ci)ci.value=city;if(st)st.value=state;
  var d=document.getElementById('cityD');if(d)d.classList.remove('op');
}

// ── SAVE VENDOR ──────────────────────────────────────────────────
function saveV(st){
  var name=(document.getElementById('fName')||{value:''}).value.trim();
  if(!name){toast('Vendor name required','er2');return;}
  var cats=Array.from(document.querySelectorAll('.ck input[type=checkbox]:checked')).map(function(cb){return cb.value;});
  if(!cats.length){toast('Select at least one category','er2');return;}
  var prods=selProds.map(function(id){var p=P.find(function(x){return x._id===id;});return p?{_id:p._id,name:p.name,unit:p.unit||''}:null;}).filter(Boolean);
  function g(id){var el=document.getElementById(id);return el?el.value.trim():'';}
  var payload={
    _id:EVid||('local_'+Date.now()),
    name:name,code:g('fCode'),type:g('fType'),
    categories:cats,products:prods,
    contact:g('fCon'),designation:g('fDes'),phone:g('fPhone'),email:g('fEmail'),
    address:(document.getElementById('fAddr')||{value:''}).value.trim(),
    pincode:g('fPin'),city:g('fCity'),state:g('fState'),website:g('fWeb'),
    gst:g('fGst').toUpperCase(),pan:g('fPan').toUpperCase(),msme:g('fMsme'),
    payment_terms:g('fTerms'),bank:g('fBank'),account_no:g('fAcc'),ifsc:g('fIfsc'),
    notes:(document.getElementById('fNotes')||{value:''}).value.trim(),
    rating:rating||0,
    status:EVid?(V.find(function(x){return x._id===EVid;})||{}).status||st:st,
    created_by:CU.name,created_at:EVid?undefined:new Date().toISOString()
  };
  if(!payload.created_at)delete payload.created_at;
  if(EVid){var i=V.findIndex(function(x){return x._id===EVid;});if(i>-1)V[i]=Object.assign({},V[i],payload);}
  else V.unshift(payload);
  saveL('spl_v',V);
  fetch(EVid?API+'/vendors/'+EVid:API+'/vendors',{method:EVid?'PUT':'POST',credentials:'include',headers:{'content-type':'application/json'},body:JSON.stringify(payload)}).catch(function(){});
  toast(EVid?'Vendor updated ✓':'Vendor added ✓','ok');
  cM('vm');renderAll();
}
function renderAll(){updateStats();renderTable();renderPending();renderApproved();renderActive();renderBL();}

// ── WORKFLOW ──────────────────────────────────────────────────────
function approveV(id){patchSt(id,'approved',{approved_at:new Date().toISOString(),approved_by:CU.name});toast('Vendor approved ✓','ok');renderAll();}
function activateV(id){patchSt(id,'active',{activated_at:new Date().toISOString()});toast('Vendor activated ✓','ok');renderAll();}
function reinstateV(id){if(!confirm('Reinstate?'))return;patchSt(id,'approved',{blacklist_reason:null,blacklisted_at:null});toast('Reinstated','ok');renderAll();}
// openBL and confBL defined below
function patchSt(id,st,extra){
  var i=V.findIndex(function(x){return x._id===id;});if(i<0)return;
  V[i]=Object.assign({},V[i],{status:st},extra||{});saveL('spl_v',V);
  fetch(API+'/vendors/'+id+'/status',{method:'PATCH',credentials:'include',headers:{'content-type':'application/json'},body:JSON.stringify(Object.assign({status:st},extra||{}))}).catch(function(){});
}

// ── DETAIL ───────────────────────────────────────────────────────
function openDet(id){
  var v=V.find(function(x){return x._id===id;});if(!v)return;
  detId=id;detTab='ov';
  var ftrs='<button class="btn bo" onclick="cM(\'dm\')">Close</button><button class="btn bo" onclick="openEditV(\''+id+'\');cM(\'dm\')">Edit</button>';
  if(CU.dir){
    if(v.status==='pending')ftrs+='<button class="btn bgn" onclick="approveV(\''+id+'\');cM(\'dm\')">✓ Approve</button>';
    if(v.status==='approved')ftrs+='<button class="btn bp" onclick="activateV(\''+id+'\');cM(\'dm\')">Activate</button>';
    if(v.status==='active')ftrs+='<button class="btn bdn" onclick="openBL(\''+id+'\')">Blacklist</button>';
    if(v.status==='blacklisted')ftrs+='<button class="btn bam" onclick="reinstateV(\''+id+'\');cM(\'dm\')">Reinstate</button>';
  }
  var tabs='<div class="dts"><button class="dt on" onclick="swTab(\'ov\',this)">Overview</button><button class="dt" onclick="swTab(\'prods\',this)">Products</button><button class="dt" onclick="swTab(\'fin\',this)">Finance</button><button class="dt" onclick="swTab(\'hist\',this)">History</button></div>';
  var html='<div class="ov hidden" id="dm"><div class="md mdw"><div class="mh"><div><h2>'+esc(v.name)+'</h2><div class="ms">'+esc(v.code||'')+'  ·  '+(v.categories||[]).join(', ')+'</div></div><div style="display:flex;align-items:center;gap:7px">'+sbadge(v.status)+'<button class="mc" onclick="cM(\'dm\')">✕</button></div></div>'+
    '<div class="mb">'+tabs+'<div id="dtc">'+detContent(v,'ov')+'</div></div>'+
    '<div class="mf">'+ftrs+'</div></div></div>';
  var old=document.getElementById('dm');if(old)old.outerHTML=html;else document.getElementById('overlays').insertAdjacentHTML('beforeend',html);
  var el=document.getElementById('dm');el.addEventListener('click',function(e){if(e.target===el)cM('dm');});
  openM('dm');
}
function swTab(tab,el){
  detTab=tab;
  document.querySelectorAll('.dt').forEach(function(t){t.classList.remove('on');});if(el)el.classList.add('on');
  var v=V.find(function(x){return x._id===detId;});if(!v)return;
  var c=document.getElementById('dtc');if(c)c.innerHTML=detContent(v,tab);
}
function detContent(v,tab){
  if(tab==='ov'){
    return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 20px">'+
      '<div>'+ds('Basic Info',[['Code',v.code||'—'],['Type',v.type||'—'],['Categories',(v.categories||[]).map(cpill).join(' ')],['Status',sbadge(v.status)],['Rating',stars(v.rating)]])+
      ds('Contact',[['Person','<b>'+esc(v.contact||'—')+'</b>'],['Phone',v.phone||'—'],['Email',v.email?'<a href="mailto:'+esc(v.email)+'" style="color:var(--bl)">'+esc(v.email)+'</a>':'—']])+
      '</div><div>'+
      ds('Location',[['Pincode',v.pincode||'—'],['City',v.city||'—'],['State',v.state||'—'],['Address','<span style="white-space:pre-line">'+esc(v.address||'—')+'</span>']])+
      (v.notes?'<div class="ds"><h3>Notes</h3><p style="font-size:12px;white-space:pre-line">'+esc(v.notes)+'</p></div>':'')+
      '</div></div>';
  } else if(tab==='prods'){
    var prods=(v.products||[]);
    return prods.length?'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:7px">'+
      prods.map(function(p){var n=typeof p==='object'?p.name:p;var pm=P.find(function(x){return x.name===n;});
        return '<div style="background:var(--bs);border:1px solid var(--br);border-radius:6px;padding:9px 11px"><div style="font-size:12.5px;font-weight:700">'+esc(n)+'</div><div style="font-size:10.5px;color:var(--k4);margin-top:2px">'+(pm&&pm.unit?pm.unit:'')+(pm&&pm.category?' · '+pm.category:'')+'</div></div>';
      }).join('')+'</div>':'<p style="font-size:12.5px;color:var(--k4);padding:12px 0">No products registered.</p>';
  } else if(tab==='fin'){
    return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 20px">'+
      ds('Tax & Compliance',[['GSTIN',v.gst||'—'],['PAN',v.pan||'—'],['MSME',v.msme||'—'],['Payment Terms',v.payment_terms||'—']])+
      ds('Bank Details',[['Bank',v.bank||'—'],['Account No.',v.account_no||'—'],['IFSC',v.ifsc||'—']])+
      '</div>';
  } else {
    var steps=[{t:'Vendor Added',d:v.created_at,b:v.created_by,done:true},{t:'Submitted for Review',d:v.created_at,done:true}];
    if(v.approved_at)steps.push({t:'Approved',d:v.approved_at,b:v.approved_by,done:true});
    else steps.push({t:'Pending Approval',done:false,act:v.status==='pending'});
    if(v.activated_at||v.status==='active')steps.push({t:'Activated',d:v.activated_at,done:true});
    if(v.blacklisted_at)steps.push({t:'Blacklisted: '+(v.blacklist_reason||''),d:v.blacklisted_at,done:true,err:true});
    return '<div>'+steps.map(function(s,i){
      var dc=s.err?'tld tdr':s.done?'tld tdg':s.act?'tld tdb':'tld tdp';
      return '<div class="tli"><div class="'+dc+'">'+(s.done&&!s.err?'✓':(i+1))+'</div><div>'+
        '<div style="font-size:12.5px;font-weight:600">'+esc(s.t)+'</div>'+
        (s.d||s.b?'<div style="font-size:10.5px;color:var(--k4)">'+(s.d?fd(s.d):'')+(s.b?' · '+esc(s.b):'')+'</div>':'')+
        '</div></div>';
    }).join('')+'</div>';
  }
}
function ds(title,rows){
  return '<div class="ds"><h3>'+esc(title)+'</h3>'+rows.map(function(r){return '<div class="dr"><span class="dk">'+esc(r[0])+'</span><span class="dv">'+r[1]+'</span></div>';}).join('')+'</div>';
}

function suggestPCode(){
  var yy=String(new Date().getFullYear()).slice(-2);
  return 'SPL-P-'+yy+'-'+String(P.length+1).padStart(3,'0');
}
function saveP(){
  var gv=function(id){var el=document.getElementById(id);return el?(el.value||'').trim():'';};
  var name=gv('pmN');if(!name){toast('Product name required','er2');return;}
  var cat=gv('pmC');if(!cat){toast('Category required','er2');return;}
  var unit=gv('pmU');if(!unit){toast('Unit required','er2');return;}
  var payload={
    _id:EPid||('p_'+Date.now()),name:name,code:gv('pmCode'),
    category:cat,unit:unit,alt_unit:gv('pmAU'),conv_factor:gv('pmCF'),
    hsn:gv('pmH'),gst_rate:gv('pmG'),moq:gv('pmMOQ'),lead_time:gv('pmLead'),
    description:gv('pmDesc'),notes:gv('pmNotes'),
    created_by:CU.name,created_at:EPid?undefined:new Date().toISOString()
  };
  if(!payload.created_at)delete payload.created_at;
  if(EPid){var idx=P.findIndex(function(x){return x._id===EPid;});if(idx>-1)P[idx]=Object.assign({},P[idx],payload);}
  else P.push(payload);
  saveL('spl_prod',P);
  fetch(EPid?API+'/products/'+EPid:API+'/products',{method:EPid?'PUT':'POST',credentials:'include',headers:{'content-type':'application/json'},body:JSON.stringify(payload)}).catch(function(){});
  toast(EPid?'Product updated':'Product added','ok');
  cM('pm');renderProds();
}
function delP(id){
  if(!confirm('Delete this product?'))return;
  P=P.filter(function(p){return p._id!==id;});
  saveL('spl_prod',P);
  fetch(API+'/products/'+id,{method:'DELETE',credentials:'include'}).catch(function(){});
  toast('Product deleted','ok');
  renderProds();
}

function renderProds(){
var q=(document.getElementById('pmq')||{value:''}).value.toLowerCase();
var cf=(document.getElementById('pmcat')||{value:''}).value;
var so=(document.getElementById('pmsort')||{value:'name'}).value;
var rows=P.filter(function(p){
  if(cf&&p.category!==cf)return false;
  if(q){var h=[p.name,p.category||'',p.unit||'',p.hsn||'',p.description||''].join(' ').toLowerCase();if(!h.includes(q))return false;}
  return true;
});
if(so==='cat')rows.sort(function(a,b){return(a.category||'').localeCompare(b.category||'')||a.name.localeCompare(b.name);});

var ps=document.getElementById('pm-stats');

function pmini(k,v,color){return '<div style="padding:7px 10px;border-right:1px solid var(--br);font-size:10.5px"><div style="color:var(--k4);font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px">'+k+'</div><div style="font-weight:700;color:'+(color||'var(--k2)')+'">'+v+'</div></div>';}
function catPillStyle(name){
var c=C.find(function(x){return x.name===name;});
var cls=c?c.colorClass||'c7':'c7';
var STYLES={c1:'background:#fef9c3;color:#713f12',c2:'background:#e0e7ff;color:#3730a3',c3:'background:#fce7f3;color:#9d174d',c4:'background:#dbeafe;color:#1e3a8a',c5:'background:#d1fae5;color:#065f46',c6:'background:#ede9fe;color:#5b21b6',c7:'background:#f4f4f4;color:#9a9a9a',c8:'background:#fff7ed;color:#c2410c',c9:'background:#fef2f2;color:#b91c1c'};
var ICONS={c1:'🪵',c2:'🧪',c3:'📦',c4:'🚛',c5:'🔧',c6:'🛠️',c7:'📦'};
return {style:STYLES[cls]||STYLES.c7,icon:c?c.icon||ICONS[cls]:ICONS[cls]||'📦'};
}

function rebuildCatModal(){
  var snap={
    name:(document.getElementById('cmN')||{value:''}).value,
    description:(document.getElementById('cmD')||{value:''}).value,
    sort_order:(document.getElementById('cmOrd')||{value:''}).value,

    notes:(document.getElementById('cmNotes')||{value:''}).value,

  };

  });

function updateCatPreview(){
  var name=(document.getElementById('cmN')||{value:'Category'}).value||'Category';

function saveC(){
  var gv=function(id){var el=document.getElementById(id);return el?(el.value||'').trim():'';};
  var name=gv('cmN');if(!name){toast('Category name required','er2');return;}
  var payload={
    _id:ECid||('cat_'+Date.now()),name:name,
    icon:cmSelIcon||gv('cmI'),colorClass:cmSelColor||'c7',
    description:gv('cmD'),sort_order:parseInt(gv('cmOrd'))||99,
    status:gv('cmSt')||'active',notes:gv('cmNotes'),

  };

    products:['Code','Name','Category','Unit','Alt Unit','Conv Factor','HSN','GST%','MOQ','Lead Days','Description'],

function handleImport(input,type){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var content=e.target.result;
    var rows=null,count=0,isJson=type==='all';
    try{
      if(isJson){
        var data=JSON.parse(content);
        rows=data;
        count=(data.vendors||[]).length+(data.products||[]).length+(data.categories||[]).length+(data.cities||[]).length;
      } else {
        var lines=content.split('\n').filter(function(l){return l.trim();});
        var hdrs=lines[0].split(',').map(function(h){return h.replace(/^"|"$/g,'').trim().toLowerCase();});
        rows=lines.slice(1).map(function(line){
          var vals=line.match(/(".*?"|[^,]+|(?<=,)(?=,))/g)||line.split(',');
          var obj={};
          hdrs.forEach(function(h,i){obj[h]=(vals[i]||'').replace(/^"|"$/g,'').trim();});
          return obj;
        }).filter(function(r){return Object.values(r).some(function(v){return v;});});
        count=rows.length;
      }
      window._importRows=rows;
      var prev=document.getElementById('import-preview-area');
      if(prev){
        prev.innerHTML='<div style="background:var(--gs);border:1px solid var(--green-mid,#bbf7d0);border-radius:6px;padding:9px 12px;font-size:12.5px;color:var(--g)">'+
          '&#x2713; Found <strong>'+count+' records</strong> ready to import.'+
          (isJson?' Includes vendors, products, categories and cities.':'')+
          '</div>';
      }
      var btn=document.getElementById('imp-confirm-btn');if(btn)btn.disabled=false;
    }catch(err){
      var prev2=document.getElementById('import-preview-area');
      if(prev2) prev2.innerHTML='<div style="background:var(--rs);border:1px solid var(--red-mid,#f8c5c2);border-radius:6px;padding:9px 12px;font-size:12.5px;color:var(--r)">&#x2715; Parse error: '+esc(err.message)+'</div>';
    }
  };
  reader.readAsText(file);
}

function confirmImportData(){
  var type=window._importType;
  var rows=window._importRows;
  if(!rows){toast('No data to import','wn');return;}
  var added=0;
  if(type==='all'){
    // Full JSON restore
    if(rows.vendors){rows.vendors.forEach(function(v){if(v._id&&!V.find(function(x){return x._id===v._id;})){V.push(v);added++;}});}
    if(rows.products){rows.products.forEach(function(p){if(p._id&&!P.find(function(x){return x._id===p._id;})){P.push(p);added++;}});}
    if(rows.categories){rows.categories.forEach(function(c){if(c._id&&!C.find(function(x){return x._id===c._id;})){C.push(c);added++;}});}
    if(rows.cities){rows.cities.forEach(function(c){if(c._id&&!CIT.find(function(x){return x._id===c._id;})){CIT.push(c);added++;}});}
    saveL('spl_v',V);saveL('spl_prod',P);saveL('spl_cat',C);saveL('spl_city',CIT);
  } else if(type==='vendors'){
    rows.forEach(function(r){
      var name=r.name||r['vendor name']||'';if(!name)return;
      if(V.find(function(v){return v.name.toLowerCase()===name.toLowerCase();}))return;
      V.push({_id:'v_'+Date.now()+'_'+added,name:name,code:r.code||'',type:r.type||'',categories:(r.categories||'').split('|').filter(Boolean),contact:r.contact||'',phone:r.phone||'',email:r.email||'',city:r.city||'',state:r.state||'',pincode:r.pincode||'',gst:r.gstin||r.gst||'',payment_terms:r['payment terms']||r.payment_terms||'',status:r.status||'pending',created_by:CU.name,created_at:new Date().toISOString()});
      added++;
    });
    saveL('spl_v',V);
  } else if(type==='products'){
    rows.forEach(function(r){
      var name=r.name||r['product name']||'';if(!name)return;
      if(P.find(function(p){return p.name.toLowerCase()===name.toLowerCase();}))return;
      P.push({_id:'p_'+Date.now()+'_'+added,name:name,code:r.code||'',category:r.category||'',unit:r.unit||'',hsn:r.hsn||r['hsn code']||'',gst_rate:r['gst%']||r.gst||'',description:r.description||''});
      added++;
    });
    saveL('spl_prod',P);
  } else if(type==='categories'){
    rows.forEach(function(r){
      var name=r.name||'';if(!name)return;
      if(C.find(function(c){return c.name.toLowerCase()===name.toLowerCase();}))return;
      C.push({_id:'cat_'+Date.now()+'_'+added,name:name,icon:r.icon||'&#x1F3F7;',colorClass:r.color||'c7',description:r.description||'',sort_order:parseInt(r['sort order'])||99,status:r.status||'active'});
      added++;
    });
    saveL('spl_cat',C);buildSidebar();
  } else if(type==='cities'){
    rows.forEach(function(r){
      var city=r.city||'';var state=r.state||'';if(!city||!state)return;
      if(CIT.find(function(c){return c.city.toLowerCase()===city.toLowerCase()&&c.state===state;}))return;
      CIT.push({_id:'cit_'+Date.now()+'_'+added,city:city,state:state,pincodes:(r.pincodes||'').split('|').filter(Boolean)});
      added++;
    });
    saveL('spl_city',CIT);
  }
  toast('Imported '+added+' records','ok');
  cM('import-modal');renderAll();
}

function suggestPCode(){var yy=String(new Date().getFullYear()).slice(-2);return 'SPL-P-'+yy+'-'+String(P.length+1).padStart(3,'0');}

function saveP(){
var gv=function(id){var el=document.getElementById(id);return el?(el.value||'').trim():'';};
var name=gv('pmN');if(!name){toast('Product name required','er2');return;}
var cat=gv('pmC');if(!cat){toast('Category required','er2');return;}
var unit=gv('pmU');if(!unit){toast('Unit required','er2');return;}
var payload={_id:EPid||('p_'+Date.now()),name:name,code:gv('pmCode'),category:cat,unit:unit,alt_unit:gv('pmAU'),conv_factor:gv('pmCF'),hsn:gv('pmH'),gst_rate:gv('pmG'),moq:gv('pmMOQ'),lead_time:gv('pmLead'),description:gv('pmDesc'),notes:gv('pmNotes'),created_by:CU.name,created_at:EPid?undefined:new Date().toISOString()};
if(!payload.created_at)delete payload.created_at;
if(EPid){var idx=P.findIndex(function(x){return x._id===EPid;});if(idx>-1)P[idx]=Object.assign({},P[idx],payload);}else P.push(payload);
saveL('spl_prod',P);
fetch(EPid?API+'/products/'+EPid:API+'/products',{method:EPid?'PUT':'POST',credentials:'include',headers:{'content-type':'application/json'},body:JSON.stringify(payload)}).catch(function(){});
toast(EPid?'Product updated ✓':'Product added ✓','ok');cM('pm');renderProds();
}
