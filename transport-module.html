<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Transport Module — Strandply</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Urbanist:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --r:#D5110A;--rd:#A60D07;--rs:#FDECEB;
  --bg:#fff;--bs:#fafafa;--b2:#f4f4f4;
  --k:#1a1a1a;--k4:#9a9a9a;--k5:#c8c8c8;
  --br:#e4e4e4;--br2:#cacaca;
  --g:#15803d;--gs:#ecfdf5;
  --bl:#1d4ed8;--bls:#eff6ff;
  --am:#b45309;--ams:#fffbeb;--amd:#fde68a;
  --sh:0 1px 3px rgba(0,0,0,.07);
  --shm:0 4px 16px rgba(0,0,0,.08);
  --shl:0 12px 36px rgba(0,0,0,.12)
}
html,body{min-height:100vh;background:var(--bs);color:var(--k);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:inherit}
a{text-decoration:none}
.tb{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-bottom:1px solid var(--br);height:54px;padding:0 20px;display:flex;align-items:center;justify-content:space-between}
.tb-logo{width:32px;height:32px;border-radius:7px;background:var(--r);color:#fff;font-family:'Urbanist',sans-serif;font-weight:900;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb-name{font-family:'Urbanist',sans-serif;font-weight:800;font-size:14px;color:var(--k)}.tb-name em{color:var(--r);font-style:normal}
.tb-sub{font-size:9.5px;color:var(--k4);text-transform:uppercase;letter-spacing:.07em}
.uchip{display:flex;align-items:center;gap:8px;padding:4px 10px;background:var(--bs);border:1px solid var(--br);border-radius:99px}
.uchip .un{font-size:12px;font-weight:700}.uchip .ur{font-size:9.5px;color:var(--k4);text-transform:uppercase;letter-spacing:.07em}
.hbtn{padding:5px 12px;border:1px solid var(--br);border-radius:5px;font-size:11px;font-weight:700;font-family:'Urbanist',sans-serif;color:var(--k4);background:var(--bg);cursor:pointer}
.hbtn:hover{border-color:var(--r);color:var(--r)}
.lay{display:flex;min-height:calc(100vh - 54px)}
.sb{width:215px;flex-shrink:0;border-right:1px solid var(--br);background:var(--bg);padding:14px 0;position:sticky;top:54px;height:calc(100vh - 54px);overflow-y:auto;display:flex;flex-direction:column}
.nl{font-size:9px;font-weight:800;color:var(--k5);text-transform:uppercase;letter-spacing:.13em;padding:7px 10px 3px}
.nb{display:flex;align-items:center;gap:7px;width:calc(100% - 16px);padding:7px 10px;border-radius:5px;font-size:12.5px;font-weight:600;color:var(--k4);cursor:pointer;border:none;background:none;text-align:left;transition:.12s;margin:1px 8px}
.nb:hover{background:var(--b2);color:var(--k)}.nb.on{background:var(--rs);color:var(--r);font-weight:700}
.nb .ni{font-size:13px;width:17px;text-align:center;flex-shrink:0}
.nbd{margin-left:auto;background:var(--r);color:#fff;border-radius:99px;font-size:9px;font-weight:800;padding:1px 5px;min-width:16px;text-align:center}
.ndv{border:none;border-top:1px solid var(--br);margin:6px 10px}
.sbf{margin-top:auto;padding:10px 12px;border-top:1px solid var(--br);font-size:10px;color:var(--k4);line-height:1.7}
.mn{flex:1;min-width:0;padding:0 24px 80px}
.ph{padding:22px 0 14px;display:flex;align-items:flex-end;justify-content:space-between;gap:10px;flex-wrap:wrap}
.ph h1{font-family:'Urbanist',sans-serif;font-size:22px;font-weight:900;letter-spacing:-.02em}
.ph h1 em{color:var(--r);font-style:normal}
.ph p{color:var(--k4);font-size:12px;margin-top:3px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:5px;font-size:12px;font-family:'Urbanist',sans-serif;font-weight:700;border:1.5px solid transparent;background:transparent;color:var(--k);transition:.13s;cursor:pointer}
.bp{background:var(--r);color:#fff;border-color:var(--r)}.bp:hover{background:var(--rd)}
.bo{border-color:var(--br2);color:var(--k);background:var(--bg)}.bo:hover{border-color:var(--k4)}
.bg2{color:var(--k4)}.bg2:hover{background:var(--b2)}
.bgn{background:var(--g);color:#fff;border-color:var(--g)}.bgn:hover{background:#166534}
.bwa{background:#16a34a;color:#fff;border-color:#16a34a}.bwa:hover{background:#15803d}
.bcl{background:#0369a1;color:#fff;border-color:#0369a1}.bcl:hover{background:#075985}
.bam{background:var(--am);color:#fff;border-color:var(--am)}.bam:hover{background:#92400e}
.bsm{padding:4px 9px;font-size:11px}.bxs{padding:3px 7px;font-size:10.5px}
.sr{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:9px;margin-bottom:16px}
.sc{background:var(--bg);border:1px solid var(--br);border-radius:8px;padding:12px 14px;box-shadow:var(--sh);cursor:pointer;transition:.15s;display:block}
.sc:hover{border-color:var(--r);box-shadow:var(--shm);transform:translateY(-1px)}
.sc .sl{font-size:9.5px;font-weight:700;color:var(--k4);text-transform:uppercase;letter-spacing:.09em;margin-bottom:4px}
.sc .sv{font-family:'Urbanist',sans-serif;font-size:22px;font-weight:900;line-height:1}
.sc .ss{font-size:10.5px;color:var(--k4);margin-top:2px}
.scr .sv{color:var(--r)}.sca .sv{color:var(--bl)}.scl .sv{color:var(--g)}.scg .sv{color:var(--am)}
.tw{border:1px solid var(--br);border-radius:8px;overflow:hidden;box-shadow:var(--sh);background:var(--bg)}
.vt{width:100%;border-collapse:collapse;font-size:12.5px}
.vt thead th{background:var(--bs);border-bottom:1px solid var(--br);padding:8px 11px;text-align:left;font-size:9.5px;font-weight:700;color:var(--k4);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.vt tbody tr{border-bottom:1px solid var(--br);transition:.1s}.vt tbody tr:last-child{border-bottom:none}
.vt tbody tr:hover{background:var(--bs)}.vt td{padding:9px 11px;vertical-align:middle}
.er{text-align:center;padding:40px 16px;color:var(--k4)}
.er .ei{font-size:32px;margin-bottom:8px}
.er h3{font-family:'Urbanist',sans-serif;font-size:15px;font-weight:700;color:var(--k);margin-bottom:4px}
.ac{display:flex;gap:4px;flex-wrap:nowrap;align-items:center}
.bd{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.bd::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.bp2{background:var(--ams);color:var(--am)}.bp2::before{background:var(--am)}
.ba{background:var(--bls);color:var(--bl)}.ba::before{background:var(--bl)}
.bl2{background:var(--gs);color:var(--g)}.bl2::before{background:var(--g)}
.bi{background:var(--b2);color:var(--k4)}.bi::before{background:var(--k5)}
.bb{background:#fef2f2;color:var(--r)}.bb::before{background:var(--r)}
.addr-tag{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;background:var(--bls);color:var(--bl);border-radius:99px;font-size:10px;font-weight:700}
.pin-badge{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;background:var(--ams);color:var(--am);border-radius:99px;font-size:10px;font-weight:700}
.veh-tag{padding:1px 7px;background:var(--b2);border-radius:3px;font-size:10px;font-weight:700;color:var(--k4)}
.id-tag{font-family:monospace;font-size:11px;background:var(--b2);padding:2px 7px;border-radius:3px;font-weight:700;border:1px solid var(--br)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:500;display:flex;align-items:flex-start;justify-content:center;padding:20px 14px;overflow-y:auto}
.md{background:var(--bg);border:1px solid var(--br);border-radius:12px;box-shadow:var(--shl);width:100%;max-width:720px;margin:auto}
.md.mdw{max-width:900px}.md.mds{max-width:460px}.md.mdxl{max-width:1060px}
.mh{padding:18px 22px 14px;border-bottom:1px solid var(--br);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.mh h2{font-family:'Urbanist',sans-serif;font-size:17px;font-weight:800;letter-spacing:-.01em}
.mh .ms{font-size:11px;color:var(--k4);margin-top:2px}
.mcl{background:none;border:none;font-size:18px;cursor:pointer;color:var(--k4);padding:2px;line-height:1}.mcl:hover{color:var(--r)}
.mb{padding:18px 22px}.mf{padding:12px 22px;border-top:1px solid var(--br);display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:wrap}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
.fg3{grid-template-columns:1fr 1fr 1fr}
.ff{grid-column:1/-1}
.fd{display:flex;flex-direction:column;gap:4px;position:relative}
.fd label{font-size:9.5px;font-weight:700;color:var(--k4);text-transform:uppercase;letter-spacing:.05em}
.fd label .rq{color:var(--r)}
.fd input,.fd select,.fd textarea{padding:7px 10px;border:1.5px solid var(--br);border-radius:5px;font-size:13px;color:var(--k);background:var(--bg);outline:none;min-height:36px;transition:.13s;width:100%}
.fd input:focus,.fd select:focus,.fd textarea:focus{border-color:var(--r);box-shadow:0 0 0 3px rgba(213,17,10,.06)}
.fd textarea{resize:vertical;min-height:60px}
.sdv{grid-column:1/-1;border:none;border-top:1px solid var(--br);margin:4px 0}
.slb{grid-column:1/-1;font-family:'Urbanist',sans-serif;font-size:10.5px;font-weight:800;color:var(--k);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
.ac-wrap{position:relative}
.ac-drop{position:absolute;top:calc(100% + 2px);left:0;right:0;background:var(--bg);border:1.5px solid var(--r);border-radius:6px;box-shadow:var(--shm);z-index:9999;max-height:220px;overflow-y:auto;display:none}
.ac-drop.open{display:block}
.ac-item{padding:8px 12px;font-size:12.5px;cursor:pointer;border-bottom:1px solid var(--br);display:flex;justify-content:space-between;align-items:center}
.ac-item:last-child{border-bottom:none}.ac-item:hover{background:var(--rs)}.ac-item:hover .ac-city{color:var(--r)}
.ac-city{font-weight:700;color:var(--k)}.ac-meta{font-size:10.5px;color:var(--k4)}
.pin-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.pin-tag{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;background:var(--bs);border:1.5px solid var(--br);border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;transition:.12s;color:var(--k)}
.pin-tag:hover,.pin-tag.sel{border-color:var(--r);background:var(--rs);color:var(--r)}
.msw{border:1.5px solid var(--br);border-radius:5px;background:var(--bg);min-height:40px;padding:4px 8px;display:flex;flex-wrap:wrap;gap:4px;align-items:center;cursor:text;transition:.13s}
.msw:focus-within{border-color:var(--r)}
.mst{display:inline-flex;align-items:center;gap:4px;background:var(--rs);color:var(--r);border:1px solid #f8c5c2;border-radius:3px;padding:2px 8px;font-size:11px;font-weight:700;white-space:nowrap}
.mst button{background:none;border:none;cursor:pointer;color:var(--r);font-size:13px;line-height:1;padding:0;opacity:.7}.mst button:hover{opacity:1}
.msi{border:none;outline:none;font-size:12.5px;color:var(--k);min-width:100px;flex:1;background:transparent;padding:2px 4px}
.ck{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border:1.5px solid var(--br);border-radius:5px;cursor:pointer;font-size:11.5px;font-weight:600;color:var(--k4);transition:.12s;user-select:none}
.ck.on{border-color:var(--r);background:var(--rs);color:var(--r)}
.star{font-size:14px;color:var(--k5)}.star.on{color:#f59e0b}
.call-btn{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:99px;color:#1d4ed8;font-size:11px;font-weight:700;text-decoration:none;cursor:pointer;transition:.12s}
.call-btn:hover{background:#dbeafe}
.card{background:var(--bg);border:1px solid var(--br);border-radius:8px;padding:14px 16px;box-shadow:var(--sh);margin-bottom:12px}
.sh2{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sh2 h3{font-family:'Urbanist',sans-serif;font-size:13px;font-weight:800;color:var(--k)}
.tli{display:flex;gap:10px;padding-bottom:12px;position:relative}
.tli::before{content:'';position:absolute;left:7px;top:18px;bottom:0;width:1.5px;background:var(--br)}
.tli:last-child::before{display:none}.tli:last-child{padding-bottom:0}
.tld{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;flex-shrink:0;margin-top:3px;z-index:1;border:2px solid var(--bg)}
.tdg{background:var(--g)}.tdb{background:var(--bl)}.tdp{background:var(--k5)}.tdr{background:var(--r)}.tdam{background:var(--am)}
.rt-best td{background:#f0fdf4}.rt-best td:first-child{border-left:3px solid var(--g)}
.rank-b{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:800;font-family:'Urbanist',sans-serif}
.rank-1{background:var(--gs);color:var(--g)}.rank-2{background:var(--bls);color:var(--bl)}.rank-3{background:var(--ams);color:var(--am)}
.rate-val{font-family:'Urbanist',sans-serif;font-size:15px;font-weight:900;color:var(--k)}
.flow-chain{display:flex;align-items:center;gap:0;flex-wrap:wrap;margin:10px 0 14px}
.fc-step{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:6px;font-size:11.5px;font-weight:700;border:1.5px solid var(--br);background:var(--bg);cursor:default;white-space:nowrap}
.fc-step.done{background:var(--gs);border-color:#bbf7d0;color:var(--g)}
.fc-step.active{background:var(--rs);border-color:#f8c5c2;color:var(--r)}
.fc-step.pending{background:var(--bs);border-color:var(--br);color:var(--k4)}
.fc-step.clickable{cursor:pointer}.fc-step.clickable:hover{border-color:var(--bl);color:var(--bl);background:var(--bls)}
.fc-arr{color:var(--k5);font-size:14px;margin:0 2px}
.wf-steps{display:flex;align-items:flex-start;gap:0;margin:14px 0}
.wf-step{flex:1;text-align:center;position:relative}
.wf-step::before{content:'';position:absolute;top:15px;left:50%;right:-50%;height:2px;background:var(--br);z-index:0}
.wf-step:last-child::before{display:none}
.wf-dot{width:30px;height:30px;border-radius:50%;border:2px solid var(--br);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:12px;margin:0 auto 6px;position:relative;z-index:1;transition:.2s}
.wf-dot.done{background:var(--g);border-color:var(--g);color:#fff}
.wf-dot.active{background:var(--r);border-color:var(--r);color:#fff;box-shadow:0 0 0 4px var(--rs)}
.wf-dot.pending{background:var(--bs);border-color:var(--br2);color:var(--k4)}
.wf-label{font-size:10.5px;font-weight:700;color:var(--k4);font-family:'Urbanist',sans-serif}
.wf-label.done{color:var(--g)}.wf-label.active{color:var(--r)}
.tc{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.ts{background:var(--k);color:#fff;padding:9px 14px;border-radius:6px;font-size:12.5px;font-weight:600;box-shadow:var(--shl);opacity:0;transform:translateY(6px);transition:.22s;max-width:300px}
.ts.sh{opacity:1;transform:translateY(0)}.ts.ok{background:var(--g)}.ts.er2{background:var(--r)}.ts.wn{background:var(--am)}
.dr{display:flex;gap:8px;margin-bottom:5px}.dk{font-size:11px;color:var(--k4);font-weight:600;min-width:130px;flex-shrink:0}
.dv2{font-size:12px;color:var(--k);font-weight:500;flex:1}
.ds{margin-bottom:14px}.ds h3{font-size:9px;font-weight:700;color:var(--k4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--br)}
.amt-cell{background:#fefce8;font-family:'Urbanist',sans-serif;font-weight:700;font-size:13px;color:#854d0e}
.draft-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;background:#fef9c3;color:#854d0e;border:1px solid #fde68a;border-radius:99px;font-size:10px;font-weight:700}
@media print{.tb,.sb{display:none!important}.lay{display:block}.mn{padding:0}}
@media(max-width:800px){.sb{display:none}.mn{padding:0 12px 80px}.fg,.fg3{grid-template-columns:1fr}.ff,.sdv,.slb{grid-column:1}}
</style>
</head>
<body>
<div class="tb">
  <div style="display:flex;align-items:center;gap:9px">
    <div class="tb-logo">SPL</div>
    <div><div class="tb-name">Transport <em>Module</em></div><div class="tb-sub">Strandply LLP · Wankaner</div></div>
  </div>
  <div style="display:flex;align-items:center;gap:7px">
    <div class="uchip"><div><div class="un" id="cuName">Jimit Mehta</div><div class="ur" id="cuRole">Dispatch Exec</div></div></div>
    <select id="roleSwitch" onchange="switchRole(this.value)" style="padding:4px 9px;border:1px solid var(--br);border-radius:5px;font-size:11px;font-weight:600;background:var(--bg);color:var(--k);cursor:pointer">
      <option value="dispatch">Dispatch Executive</option>
      <option value="accounts">Accounts</option>
    </select>
    <button class="hbtn" onclick="showSec('dashboard')" style="color:var(--bl)">Home</button>
    <button class="hbtn">Vendor Portal</button>
  </div>
</div>
<div class="lay">
  <nav class="sb">
    <div class="nl">Main Flow</div>
    <button class="nb on" id="nb-dashboard" onclick="showSec('dashboard')"><span class="ni">📊</span>Dashboard</button>
    <button class="nb" id="nb-inquiries" onclick="showSec('inquiries')"><span class="ni">📋</span>Inquiries <span class="nbd" id="nbInqC" style="display:none">0</span></button>
    <button class="nb" id="nb-ratecmp" onclick="showSec('ratecmp')"><span class="ni">💰</span>Rate Comparisons <span class="nbd" id="nbRcC" style="display:none">0</span></button>
    <button class="nb" id="nb-approval" onclick="showSec('approval')"><span class="ni">✅</span>Approvals <span class="nbd" id="nbApC" style="display:none">0</span></button>
    <button class="nb" id="nb-orders" onclick="showSec('orders')"><span class="ni">📦</span>Order Forms <span class="nbd" id="nbOrC" style="display:none">0</span></button>
    <hr class="ndv">
    <div class="nl">Masters</div>
    <button class="nb" id="nb-transporters" onclick="showSec('transporters')"><span class="ni">🏢</span>Transporters</button>
    <button class="nb" id="nb-vehicles" onclick="showSec('vehicles')"><span class="ni">🚛</span>Vehicle Types</button>
    <hr class="ndv">
    <div class="nl">Operations</div>
    <button class="nb" id="nb-trips" onclick="showSec('trips')"><span class="ni">🗺️</span>Trip Tracking</button>
    <button class="nb" id="nb-reports" onclick="showSec('reports')"><span class="ni">📈</span>Reports</button>
    <button class="nb" id="nb-import" onclick="showSec('import')"><span class="ni">📥</span>Import / Export</button>
    <div class="sbf">Transport ERP v3.0<br>Strandply LLP</div>
  </nav>
  <div class="mn" id="main"></div>
</div>
<div id="overlays"></div>
<div class="tc" id="tc"></div>

<script>
// ═══ DATA ═══════════════════════════════════════════════════════════════
var CITIES=[
  {city:'Wankaner',state:'Gujarat',pincodes:['363621','363622']},

  {city:'Ahmedabad',state:'Gujarat',pincodes:['380001','380006','380015']},
  {city:'Surat',state:'Gujarat',pincodes:['395001','395002','395003']},
  {city:'Vadodara',state:'Gujarat',pincodes:['390001','390002']},
  {city:'Jamnagar',state:'Gujarat',pincodes:['361001','361002']},
  {city:'Bhavnagar',state:'Gujarat',pincodes:['364001']},
  {city:'Mumbai',state:'Maharashtra',pincodes:['400001','400093']},
  {city:'Pune',state:'Maharashtra',pincodes:['411001','411057']},
  {city:'Nagpur',state:'Maharashtra',pincodes:['440001','440002']},
  {city:'Nashik',state:'Maharashtra',pincodes:['422001']},
  {city:'New Delhi',state:'Delhi',pincodes:['110001','110002','110003']},
  {city:'Gurugram',state:'Haryana',pincodes:['122001']},

function createCityAC(inp,drop,onSelect){
  function srch(q){if(!q)return[];var lq=q.toLowerCase();return CITIES.filter(function(c){return c.city.toLowerCase().indexOf(lq)>=0||c.state.toLowerCase().indexOf(lq)>=0||c.pincodes.some(function(p){return p.indexOf(q)>=0;});}).slice(0,8);}
  inp.addEventListener('input',function(){
    var res=srch(this.value.trim());drop.innerHTML='';
    if(!res.length){drop.classList.remove('open');return;}
    res.forEach(function(c){
      var item=document.createElement('div');item.className='ac-item';
      item.innerHTML='<span class="ac-city">'+esc(c.city)+', '+esc(c.state)+'</span><span class="ac-meta">'+c.pincodes[0]+'</span>';
      item.addEventListener('mousedown',function(e){e.preventDefault();inp.value=c.city;drop.classList.remove('open');drop.innerHTML='';onSelect(c);});
      drop.appendChild(item);
    });drop.classList.add('open');
  });
  inp.addEventListener('blur',function(){setTimeout(function(){drop.classList.remove('open');},200);});
}

}

// ═══ FLOW CHAIN ═══════════════════════════════════════════════════════════
function flowChain(active,inqId,rcId,apId,orId){
  var steps=[{key:'inq',label:'📋 Inquiry',id:inqId,sec:'inquiries'},{key:'rc',label:'💰 Rate Comparison',id:rcId,sec:'ratecmp'},{key:'ap',label:'✅ Approval',id:apId,sec:'approval'},{key:'or',label:'📦 Order Form',id:orId,sec:'orders'}];
  var order=['inq','rc','ap','or'];var ai=order.indexOf(active);
  var html='<div class="flow-chain">';
  steps.forEach(function(s,i){
    var idx=order.indexOf(s.key);var cls=idx<ai?'done':idx===ai?'active':'pending';var clickable=s.id&&idx!==ai;
    html+='<div class="fc-step '+cls+(clickable?' clickable':'')+'"'+(clickable?' onclick="showSec(\''+s.sec+'\')"':'')+' title="'+(s.id?s.id:'Not yet')+'">'+'<span>'+s.label+'</span>'+(s.id?'<span style="font-family:monospace;font-size:9.5px;opacity:.8;margin-left:2px">'+esc(s.id)+'</span>':'')+'</div>';
    if(i<steps.length-1)html+='<span class="fc-arr">→</span>';
  });
  return html+'</div>';
}

    +'</div>'
    +'<div style="background:var(--bls);border:1px solid #bfdbfe;border-radius:7px;padding:9px 14px;margin-bottom:10px;font-size:12px;color:var(--bl)">📝 Select transporter, enter rate, set Min. Guarantee Weight. <strong>Save Draft</strong> to continue later. <strong>Select →</strong> to choose the final rate and send for approval.</div>'

function buildRcRow(i,tp,rate,transit,mgw,rcId,inqId){
  var transitOpts=['Same Day','1 Day','2 Days','3 Days','4 Days','5 Days'].map(function(t){return '<option'+(t===transit?' selected':'')+'>'+t+'</option>';}).join('');
  var tpOpts='<option value="">— Select —</option>'+TRANSPORTERS.map(function(t){return '<option value="'+esc(t._id)+'"'+(tp._id===t._id?' selected':'')+'>'+esc(t.name)+'</option>';}).join('');
  return '<tr id="rcRow_'+i+'">'
    +'<td style="padding:6px 8px;font-size:11px;font-weight:700;color:var(--k4)">'+(i+1)+'</td>'
    +'<td style="padding:4px 6px"><select id="rcTp_'+i+'" style="width:100%;padding:5px 8px;border:1.5px solid var(--br);border-radius:5px;font-size:12px;min-width:160px" onchange="onRcTpChange('+i+')">'+tpOpts+'</select></td>'
    +'<td style="padding:4px 6px"><input id="rcRate_'+i+'" type="number" value="'+(rate||'')+'" placeholder="₹" style="width:110px;padding:5px 8px;border:1.5px solid var(--br);border-radius:5px;font-size:13px;font-weight:700" oninput="refreshRcSummary()"></td>'
    +'<td style="padding:4px 6px"><select id="rcTransit_'+i+'" style="padding:5px 8px;border:1.5px solid var(--br);border-radius:5px;font-size:12px">'+transitOpts+'</select></td>'
    +'<td style="padding:4px 6px"><input id="rcMgW_'+i+'" type="number" value="'+(mgw||'')+'" placeholder="MT" style="width:75px;padding:5px 8px;border:1.5px solid var(--br);border-radius:5px;font-size:12px" oninput="refreshRcSummary()"></td>'
    +'<td style="padding:4px 6px;background:#fefce8" id="rcAmt_'+i+'"><span style="font-weight:700;font-size:13px;color:#854d0e">—</span></td>'
    +'<td style="padding:4px 6px;font-size:11px" id="rcPhone_'+i+'">'+(tp.phone?'<a class="call-btn" href="tel:'+tp.phone+'">📞 '+tp.phone+'</a>':'—')+'</td>'
    +'<td style="padding:4px 6px"><button class="btn bp bxs" onclick="selectRcRow('+i+',\''+rcId+'\',\''+inqId+'\')">Select →</button></td>'
    +'</tr>';
}

window.onRcTpChange=function(i){
  var sel=document.getElementById('rcTp_'+i);if(!sel)return;
  var tp=getTp(sel.value);
  var ph=document.getElementById('rcPhone_'+i);
  if(ph)ph.innerHTML=tp.phone?'<a class="call-btn" href="tel:'+tp.phone+'">📞 '+tp.phone+'</a>':'—';
  refreshRcSummary();
};

window.addRcRow=function(rcId,inqId){
  var tbody=document.getElementById('rcTbody');if(!tbody)return;
  var i=tbody.rows.length;
  var tr=document.createElement('tr');tr.id='rcRow_'+i;
  tr.innerHTML=buildRcRow(i,{},0,'2 Days',0,rcId,inqId).replace(/^<tr[^>]*>/,'').replace(/<\/tr>$/,'');
  tbody.appendChild(tr);
};

window.refreshRcSummary=function(){
  var bar=document.getElementById('rcSummaryBar');if(!bar)return;
  var tbody=document.getElementById('rcTbody');if(!tbody)return;
  var rows=[];
  for(var i=0;i<tbody.rows.length;i++){
    var rEl=document.getElementById('rcRate_'+i);
    var mgEl=document.getElementById('rcMgW_'+i);
    var amtEl=document.getElementById('rcAmt_'+i);
    var tpEl=document.getElementById('rcTp_'+i);
    var rate=rEl&&rEl.value?parseFloat(rEl.value):0;
    var mgw=mgEl&&mgEl.value?parseFloat(mgEl.value):0;
    var amt=rate&&mgw?rate*mgw:0;
    if(amtEl){
      if(amt>0){amtEl.innerHTML='<span style="font-weight:700;font-size:13px;color:#854d0e">₹'+fmtN(amt)+'</span><div style="font-size:9.5px;color:var(--k4);margin-top:1px">'+fmtN(rate)+'×'+mgw+'</div>';}
      else{amtEl.innerHTML='<span style="font-weight:700;font-size:13px;color:#854d0e">—</span>';}
    }
    if(tpEl&&tpEl.value&&rate>0){var tp=getTp(tpEl.value);rows.push({name:tp.name||tpEl.options[tpEl.selectedIndex].text,rate:rate,amt:amt});}
  }
  if(!rows.length){bar.innerHTML='';return;}
  rows.sort(function(a,b){return a.rate-b.rate;});
  var low=rows[0];
  bar.innerHTML='<div style="display:flex;gap:10px;flex-wrap:wrap;padding:8px 12px;background:var(--gs);border:1px solid #bbf7d0;border-radius:7px;align-items:center">'
    +'<span style="font-size:11px;font-weight:700;color:var(--g)">🟢 Lowest: '+esc(low.name)+' @ ₹'+fmtN(low.rate)+'</span>'
    +(low.amt?'<span style="font-size:11px;color:#854d0e;font-weight:700;background:#fefce8;padding:2px 8px;border-radius:4px">Amt: ₹'+fmtN(low.amt)+'</span>':'')
    +(rows.length>1?'<span style="font-size:11px;color:var(--k4)">'+rows.length+' quotes</span>':'')
    +'</div>';
};

// SAVE DRAFT — key new feature
window.saveRcDraft=function(rcId,inqId){
  var tbody=document.getElementById('rcTbody');if(!tbody){toast('Rate table not found','er2');return;}
  var inq=INQUIRIES.find(function(x){return x.id===inqId;})||{};
  var quotes=[];
  for(var i=0;i<tbody.rows.length;i++){
    var tpEl=document.getElementById('rcTp_'+i);
    var rEl=document.getElementById('rcRate_'+i);
    var trEl=document.getElementById('rcTransit_'+i);
    var mgEl=document.getElementById('rcMgW_'+i);
    if(tpEl&&tpEl.value){
      var tp=getTp(tpEl.value);
      quotes.push({tid:tpEl.value,transporter:tp.name||'',rate:rEl?parseFloat(rEl.value)||0:0,transit:trEl?trEl.value:'2 Days',mgWeight:mgEl?parseFloat(mgEl.value)||0:0,rating:tp.rating||3,phone:tp.phone||''});
    }
  }
  RC_DRAFTS[rcId]={rcId:rcId,inqId:inqId,from:inq.from,to:inq.to,vehicle:inq.vehicle,quotes:quotes,savedAt:new Date().toISOString()};
  // Update seq if this is a new draft
  if(rcId==='RC-26-'+(String(_seqRc).padStart(3,'0')))_seqRc++;
  document.getElementById('rcMod').remove();
  updateBadges();
  toast(rcId+' draft saved ✓ — '+quotes.filter(function(q){return q.rate>0;}).length+' rates entered','ok');
  showSec('ratecmp');
};

window.selectRcRow=function(i,rcId,inqId){
  var tpEl=document.getElementById('rcTp_'+i);
  var rEl=document.getElementById('rcRate_'+i);
  var trEl=document.getElementById('rcTransit_'+i);
  var mgEl=document.getElementById('rcMgW_'+i);
  if(!tpEl||!tpEl.value){toast('Select a transporter for row '+(i+1),'er2');return;}
  if(!rEl||!rEl.value||parseFloat(rEl.value)<=0){toast('Enter a valid rate for row '+(i+1),'er2');return;}
  var tp=getTp(tpEl.value);
  var rate=parseFloat(rEl.value);
  var transit=trEl?trEl.value:'2 Days';
  var mgw=mgEl?parseFloat(mgEl.value)||0:0;
  // Collect all rows
  var tbody=document.getElementById('rcTbody');
  var allQuotes=[];
  for(var j=0;j<tbody.rows.length;j++){
    var te=document.getElementById('rcTp_'+j);var re=document.getElementById('rcRate_'+j);var tre=document.getElementById('rcTransit_'+j);var me=document.getElementById('rcMgW_'+j);
    if(te&&te.value&&re&&re.value&&parseFloat(re.value)>0){
      var ttp=getTp(te.value);
      allQuotes.push({tid:te.value,transporter:ttp.name||te.options[te.selectedIndex].text,rate:parseFloat(re.value),transit:tre?tre.value:'—',mgWeight:me?parseFloat(me.value)||0:0,rating:ttp.rating||3,phone:ttp.phone||''});
    }
  }
  allQuotes.sort(function(a,b){return a.rate-b.rate;});
  var lowest=allQuotes.length?allQuotes[0].rate:rate;
  var isLowest=rate===lowest;
  var inq=INQUIRIES.find(function(x){return x.id===inqId;})||{};
  var excBudget=inq.budget>0&&rate>inq.budget;
  if(!RATE_CMPS.find(function(r){return r.id===rcId;})){
    RATE_CMPS.push({id:rcId,inqId:inqId,from:inq.from,fromPin:inq.fromPin,to:inq.to,toPin:inq.toPin,vehicle:inq.vehicle,material:inq.material,weight:inq.weight,budget:inq.budget||0,quotes:allQuotes,selectedTid:tpEl.value,selectedTransporter:tp.name,selectedRate:rate,selectedTransit:transit,selectedMgWeight:mgw,isLowest:isLowest,exceedsBudget:excBudget,status:'pending_approval',created_at:new Date().toISOString()});
    _seqRc++;
    inq.status='rate_compared';inq.rcId=rcId;
    delete RC_DRAFTS[rcId];
  }
  document.getElementById('rcMod').remove();
  updateBadges();
  toast(rcId+' saved — submitting for approval','ok');
  setTimeout(function(){openApprovalSubmit(rcId);},400);
};

function clearTpFilters(){['tpQ','tpOpCity'].forEach(function(id){var e=document.getElementById(id);if(e)e.value='';});['tpSt','tpVh'].forEach(function(id){var e=document.getElementById(id);if(e)e.value='';});var s=document.getElementById('opCitySug');if(s)s.style.display='none';filtTp();}

function filtTp(){
  var q=(document.getElementById('tpQ')||{value:''}).value.trim().toLowerCase();
  var st=(document.getElementById('tpSt')||{value:''}).value;
  var vh=(document.getElementById('tpVh')||{value:''}).value;
  var oc=(document.getElementById('tpOpCity')||{value:''}).value.trim().toLowerCase();
  var sugDiv=document.getElementById('opCitySug');
  if(sugDiv&&oc.length>0){
    var allCities=[...new Set(TRANSPORTERS.reduce(function(acc,t){return acc.concat(t.op_cities.map(function(x){return x.city+', '+x.state;}));},[])) ].sort();
    var matched=allCities.filter(function(s){return s.toLowerCase().indexOf(oc)>=0;}).slice(0,8);
    if(matched.length){
      sugDiv.innerHTML=matched.map(function(s){return '<div style="padding:7px 12px;font-size:12.5px;cursor:pointer;border-bottom:1px solid #e4e4e4" data-city="'+s.replace(/"/g,'')+'">'+esc(s)+'</div>';}).join('');
      sugDiv.querySelectorAll('div').forEach(function(d){d.addEventListener('mousedown',function(e){e.preventDefault();var inp=document.getElementById('tpOpCity');if(inp){inp.value=this.dataset.city;filtTp();}sugDiv.style.display='none';});});
      sugDiv.style.display='block';
    }else{sugDiv.style.display='none';}
  }else if(sugDiv){sugDiv.style.display='none';}
  var list=TRANSPORTERS.filter(function(t){
    var qm=!q||(t.name+t.city+t.state+t.pincode+t.phone+t.contact+(t.gst||'')+t.op_cities.map(function(x){return x.city+' '+x.state;}).join(' ')).toLowerCase().indexOf(q)>=0;
    return qm&&(!st||t.state===st)&&(!vh||t.vehicles.indexOf(vh)>=0)&&(!oc||t.op_cities.some(function(x){return (x.city+', '+x.state).toLowerCase().indexOf(oc)>=0||x.city.toLowerCase().indexOf(oc)>=0;}));
  });
  var c=document.getElementById('tpTbl');if(!c)return;
  if(!list.length){c.innerHTML='<div class="er"><div class="ei">🔍</div><h3>No match</h3></div>';return;}
  c.innerHTML='<div class="tw"><table class="vt"><thead><tr><th>ID</th><th>Name & Contact</th><th>Address</th><th>Op. Cities</th><th>TDS</th><th>Vehicles</th><th>Rating</th><th>Actions</th></tr></thead><tbody>'
    +list.map(function(t){return '<tr><td><span class="id-tag">'+esc(t.code)+'</span></td><td><div style="font-weight:700">'+esc(t.name)+'</div><a class="call-btn" href="tel:'+esc(t.phone)+'">📞 '+esc(t.phone)+'</a>'+(t.phone2?'<br><a class="call-btn" style="margin-top:2px" href="tel:'+esc(t.phone2)+'">📞 '+esc(t.phone2)+' (Alt)</a>':'')+'<div style="font-size:11px;color:var(--k4)">'+esc(t.contact)+'</div></td><td><span class="addr-tag">'+esc(t.city)+', '+esc(t.state)+'</span><br><span class="pin-badge" style="margin-top:3px">📮 '+esc(t.pincode)+'</span><div style="font-size:11px;color:var(--k4);margin-top:2px">'+esc(t.address||'—')+'</div></td><td style="max-width:140px"><div style="display:flex;gap:3px;flex-wrap:wrap">'+t.op_cities.map(function(c){return '<span class="addr-tag" style="font-size:9px;margin:1px">'+esc(c.city)+'</span>';}).join('')+'</div></td><td><span class="bd '+(t.tds==='Yes'?'bl2':'bi')+'">'+(t.tds||'No')+'</span></td><td>'+t.vehicles.map(function(v){return '<span class="veh-tag" style="display:inline-block;margin:1px">'+esc(v)+'</span>';}).join('')+'</td><td>'+stars(t.rating)+'</td><td><div class="ac"><button class="btn bo bxs" onclick="viewTp(\''+t._id+'\')">View</button><a class="btn bcl bxs" href="tel:'+esc(t.phone)+'">📞</a><button class="btn bxs" style="background:var(--gs);color:var(--g);border-color:#bbf7d0" onclick="pdfTp(\''+t._id+'\')">📄</button></div></td></tr>';}).join('')
    +'</tbody></table></div>';
}

window.handleXlsxUpload=function(file){

    }catch(err){preview.innerHTML='<div style="color:var(--r);padding:10px">Error: '+esc(err.message)+'</div>';}
  };reader.readAsText(file);
};

    if(!r.valid)return;
    var t={_id:'t'+(TRANSPORTERS.length+1),name:r.name,code:'TRP-'+yr()+'-'+(String(TRANSPORTERS.length+1).padStart(3,'0')),contact:r.contact||'',phone:r.mobile||'',phone2:r.mobile2||'',email:r.email||'',address:r.address||'',city:r.city||'',state:r.state||'',pincode:r.pincode||'',gst:(r.gst||'').toUpperCase(),pan:(r.pan||'').toUpperCase(),tds:r.tds||'No',credit:r.credit||'Against Delivery',ifsc:'',bankName:'',bankBranch:'',accName:'',accNo:'',visitingCard:'',vehicles:r.vehicles?r.vehicles.split(',').map(function(v){return v.trim();}).filter(Boolean):['32FT (10T)'],op_cities:r.opCities?r.opCities.split(',').map(function(v){return{city:v.trim(),state:'',pincode:''};}).filter(function(x){return x.city;}):[], rating:3,status:'active'};
    TRANSPORTERS.push(t);added++;
  });
  _importRows=[];toast(added+' transporters imported ✓','ok');showSec('transporters');
};
